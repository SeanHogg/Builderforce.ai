  </defs><rect width="1600" height="900" fill="url(#bgGlow)"/>
    <text x="80" y="92" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="20" letter-spacing="3" font-weight="700" fill="#3DD6F5">HOW YOU BUILD</text>
    <text x="80" y="146" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="46" font-weight="800" fill="#EEF0FA">One build loop across LLM, Voice, Video, and apps</text>
    <rect x="82" y="170" width="120" height="4" rx="2" fill="url(#hairline)"/><rect x="80" y="290" width="232" height="168" rx="18" fill="rgba(255,255,255,0.035)" stroke="rgba(255,255,255,0.09)" stroke-width="1.5"/><circle cx="114" cy="330" r="20" fill="url(#coolGrad)"/><text x="114" y="337" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="19" font-weight="900" fill="#0A0B1E">1</text><text x="148" y="337" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="20" font-weight="800" fill="#EEF0FA">Describe</text><text x="102" y="382" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="16" fill="#A6ADC8"><tspan x="102" dy="0">Tell the Brain what you</tspan><tspan x="102" dy="23">want — in plain language</tspan></text><rect x="330" y="290" width="232" height="168" rx="18" fill="rgba(255,255,255,0.035)" stroke="rgba(255,255,255,0.09)" stroke-width="1.5"/><circle cx="364" cy="330" r="20" fill="url(#violetGrad)"/><text x="364" y="337" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="19" font-weight="900" fill="#0A0B1E">2</text><text x="398" y="337" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="20" font-weight="800" fill="#EEF0FA">Generate</text><text x="352" y="382" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="16" fill="#A6ADC8"><tspan x="352" dy="0">It produces the code,</tspan><tspan x="352" dy="23">dataset, voice, or shot</tspan><tspan x="352" dy="23">prompt</tspan></text><rect x="580" y="290" width="232" height="168" rx="18" fill="rgba(255,255,255,0.035)" stroke="rgba(255,255,255,0.09)" stroke-width="1.5"/><circle cx="614" cy="330" r="20" fill="url(#mintGrad)"/><text x="614" y="337" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="19" font-weight="900" fill="#0A0B1E">3</text><text x="648" y="337" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="20" font-weight="800" fill="#EEF0FA">Run on your GPU</text><text x="602" y="382" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="16" fill="#A6ADC8"><tspan x="602" dy="0">Preview the app, train,</tspan><tspan x="602" dy="23">synthesize, or render —</tspan><tspan x="602" dy="23">client-side</tspan></text><rect x="580" y="510" width="232" height="168" rx="18" fill="rgba(255,255,255,0.035)" stroke="rgba(255,255,255,0.09)" stroke-width="1.5"/><circle cx="614" cy="550" r="20" fill="url(#amberGrad)"/><text x="614" y="557" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="19" font-weight="900" fill="#0A0B1E">4</text><text x="648" y="557" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="20" font-weight="800" fill="#EEF0FA">Validate</text><text x="602" y="602" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="16" fill="#A6ADC8"><tspan x="602" dy="0">Type-check &amp; build, an</tspan><tspan x="602" dy="23">eval judge, or a live</tspan><tspan x="602" dy="23">test call</tspan></text><rect x="330" y="510" width="232" height="168" rx="18" fill="rgba(255,255,255,0.035)" stroke="rgba(255,255,255,0.09)" stroke-width="1.5"/><circle cx="364" cy="550" r="20" fill="url(#roseGrad)"/><text x="364" y="557" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="19" font-weight="900" fill="#0A0B1E">5</text><text x="398" y="557" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="20" font-weight="800" fill="#EEF0FA">Publish</text><text x="352" y="602" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="16" fill="#A6ADC8"><tspan x="352" dy="0">One click to your</tspan><tspan x="352" dy="23">Workforce Registry</tspan></text><rect x="80" y="510" width="232" height="168" rx="18" fill="rgba(255,255,255,0.035)" stroke="rgba(255,255,255,0.09)" stroke-width="1.5"/><circle cx="114" cy="550" r="20" fill="url(#violetGrad)"/><text x="114" y="557" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="19" font-weight="900" fill="#0A0B1E">6</text><text x="148" y="557" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="20" font-weight="800" fill="#EEF0FA">Call anywhere</text><text x="102" y="602" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="16" fill="#A6ADC8"><tspan x="102" dy="0">Invoke from code, CI, or</tspan><tspan x="102" dy="23">another agent</tspan></text><defs><marker id="ah12030" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#A98BFF"/></marker></defs>
    <line x1="314" y1="374" x2="328" y2="374" stroke="#A98BFF" stroke-width="2.5" marker-end="url(#ah12030)"/><defs><marker id="ah15530" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#A98BFF"/></marker></defs>
    <line x1="564" y1="374" x2="578" y2="374" stroke="#A98BFF" stroke-width="2.5" marker-end="url(#ah15530)"/><defs><marker id="ah19568" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#A98BFF"/></marker></defs>
    <line x1="696" y1="460" x2="696" y2="508" stroke="#A98BFF" stroke-width="2.5" marker-end="url(#ah19568)"/><defs><marker id="ah19818" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#A98BFF"/></marker></defs>
    <line x1="578" y1="594" x2="564" y2="594" stroke="#A98BFF" stroke-width="2.5" marker-end="url(#ah19818)"/><defs><marker id="ah16318" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 Z" fill="#A98BFF"/></marker></defs>
    <line x1="328" y1="594" x2="314" y2="594" stroke="#A98BFF" stroke-width="2.5" marker-end="url(#ah16318)"/><text x="800" y="780" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="22" fill="#A6ADC8">The <tspan font-weight="800" fill="#EEF0FA">same spine</tspan> for every modality — describe, generate, run, validate, publish, call.</text>
