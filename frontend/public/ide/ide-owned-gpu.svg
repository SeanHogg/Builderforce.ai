    <text x="80" y="92" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="20" letter-spacing="3" font-weight="700" fill="#3DD6F5">WHY ADOPT IT</text>
    <text x="80" y="146" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="46" font-weight="800" fill="#EEF0FA">Every modality, in your browser, on your GPU</text>
    <rect x="82" y="170" width="120" height="4" rx="2" fill="url(#hairline)"/><rect x="80" y="250" width="640" height="470" rx="22" fill="rgba(255,255,255,0.035)" stroke="rgba(110,116,140,0.4)" stroke-width="1.5"/><text x="120" y="306" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="26" font-weight="800" fill="#6E748C">The cloud-GPU way</text><rect x="120" y="354" width="560" height="48" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/><text x="146" y="385" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="22" fill="#FF7597">✕</text><text x="178" y="385" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="18" fill="#A6ADC8">Provision GPU servers per modality</text><rect x="120" y="416" width="560" height="48" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/><text x="146" y="447" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="22" fill="#FF7597">✕</text><text x="178" y="447" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="18" fill="#A6ADC8">Pay a metered GPU bill, idle or not</text><rect x="120" y="478" width="560" height="48" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/><text x="146" y="509" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="22" fill="#FF7597">✕</text><text x="178" y="509" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="18" fill="#A6ADC8">Ship your data to a vendor cloud</text><rect x="120" y="540" width="560" height="48" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/><text x="146" y="571" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="22" fill="#FF7597">✕</text><text x="178" y="571" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="18" fill="#A6ADC8">Wait on builds, deploys, cold starts</text><rect x="120" y="602" width="560" height="48" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/><text x="146" y="633" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="22" fill="#FF7597">✕</text><text x="178" y="633" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="18" fill="#A6ADC8">Stitch separate tools for voice &amp; video</text><rect x="880" y="250" width="640" height="470" rx="22" fill="rgba(52,224,161,0.06)" stroke="rgba(52,224,161,0.45)" stroke-width="1.5"/><text x="920" y="306" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="26" font-weight="800" fill="#34E0A1">The Builderforce way</text><rect x="920" y="354" width="560" height="48" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(52,224,161,0.18)" stroke-width="1.5"/><g transform="translate(944,378)"><circle r="13" fill="url(#mintGrad)"/><path d="M-6,1 L-1,6 L7,-5" stroke="#0A0B1E" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g><text x="976" y="385" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="18" fill="#EEF0FA">Runs in the browser on your own GPU</text><rect x="920" y="416" width="560" height="48" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(52,224,161,0.18)" stroke-width="1.5"/><g transform="translate(944,440)"><circle r="13" fill="url(#mintGrad)"/><path d="M-6,1 L-1,6 L7,-5" stroke="#0A0B1E" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g><text x="976" y="447" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="18" fill="#EEF0FA">$0 GPU bill — no servers to provision</text><rect x="920" y="478" width="560" height="48" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(52,224,161,0.18)" stroke-width="1.5"/><g transform="translate(944,502)"><circle r="13" fill="url(#mintGrad)"/><path d="M-6,1 L-1,6 L7,-5" stroke="#0A0B1E" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g><text x="976" y="509" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="18" fill="#EEF0FA">Your data never leaves the device</text><rect x="920" y="540" width="560" height="48" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(52,224,161,0.18)" stroke-width="1.5"/><g transform="translate(944,564)"><circle r="13" fill="url(#mintGrad)"/><path d="M-6,1 L-1,6 L7,-5" stroke="#0A0B1E" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g><text x="976" y="571" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="18" fill="#EEF0FA">No setup, no deploy — generate instantly</text><rect x="920" y="602" width="560" height="48" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(52,224,161,0.18)" stroke-width="1.5"/><g transform="translate(944,626)"><circle r="13" fill="url(#mintGrad)"/><path d="M-6,1 L-1,6 L7,-5" stroke="#0A0B1E" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g><text x="976" y="633" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="18" fill="#EEF0FA">LLM, Voice, Video &amp; apps in one IDE</text><text x="800" y="780" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="22" fill="#A6ADC8">Own the whole stack — <tspan font-weight="800" fill="#EEF0FA">every modality, on your hardware, with your data.</tspan></text>
