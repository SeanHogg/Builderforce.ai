<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="0%" r="120%">
      <stop offset="0%" stop-color="#1B1F46"/><stop offset="55%" stop-color="#13152F"/><stop offset="100%" stop-color="#0A0B1E"/>
    </radialGradient>
    <linearGradient id="violetGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#A98BFF"/><stop offset="100%" stop-color="#6A4DF0"/></linearGradient>
    <linearGradient id="coolGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#3DD6F5"/><stop offset="100%" stop-color="#4F8BFF"/></linearGradient>
    <linearGradient id="mintGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#5BF0BC"/><stop offset="100%" stop-color="#23B987"/></linearGradient>
    <linearGradient id="coralGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FF8F7A"/><stop offset="100%" stop-color="#F0574A"/></linearGradient>
    <linearGradient id="amberGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FFCE6B"/><stop offset="100%" stop-color="#F5A623"/></linearGradient>
    <linearGradient id="hairline" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="rgba(139,108,255,0)"/><stop offset="50%" stop-color="rgba(139,108,255,0.55)"/><stop offset="100%" stop-color="rgba(61,214,245,0)"/></linearGradient>
    <marker id="arw" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#8891AE"/></marker>
  </defs>
  <rect width="1600" height="900" fill="url(#bgGlow)"/>
  <text x="80" y="92" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="20" letter-spacing="3" font-weight="700" fill="#A98BFF">HUMAN-IN-THE-LOOP GOVERNANCE</text>
  <text x="80" y="146" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="46" font-weight="800" fill="#EEF0FA">Execution stops until a human decides</text>
  <rect x="82" y="170" width="120" height="4" rx="2" fill="url(#hairline)"/>

  <!-- Agent card -->
  <rect x="100" y="300" width="330" height="210" rx="20" fill="rgba(255,255,255,0.035)" stroke="rgba(255,255,255,0.10)" stroke-width="1.5"/>
  <rect x="100" y="300" width="6" height="210" rx="3" fill="url(#violetGrad)"/>
  <text x="140" y="362" font-size="32">🤖</text>
  <text x="192" y="360" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="25" font-weight="800" fill="#EEF0FA">Agent runs a task</text>
  <text x="140" y="406" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="19" fill="#A6ADC8"><tspan x="140" dy="0">An action needs sign-off:</tspan><tspan x="140" dy="30">git.push · deploy · db.migrate</tspan><tspan x="140" dy="30">high / urgent priority is</tspan><tspan x="140" dy="30">auto-gated by the runtime.</tspan></text>

  <line x1="430" y1="405" x2="498" y2="405" stroke="#8891AE" stroke-width="2" marker-end="url(#arw)"/>

  <!-- Gate card -->
  <rect x="510" y="270" width="410" height="270" rx="20" fill="rgba(255,255,255,0.035)" stroke="rgba(245,166,35,0.35)" stroke-width="1.5"/>
  <rect x="510" y="270" width="6" height="270" rx="3" fill="url(#amberGrad)"/>
  <text x="550" y="334" font-size="32">🚦</text>
  <text x="602" y="332" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="25" font-weight="800" fill="#EEF0FA">Approval gate</text>
  <text x="550" y="380" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="19" fill="#A6ADC8"><tspan x="550" dy="0">POST /api/approvals — execution</tspan><tspan x="550" dy="30">is genuinely blocked. No retry,</tspan><tspan x="550" dy="30">no silent time-out. It waits for a</tspan><tspan x="550" dy="30">real decision from a real person,</tspan><tspan x="550" dy="30">up to the configured window.</tspan></text>

  <line x1="715" y1="600" x2="715" y2="542" stroke="#8891AE" stroke-width="2" marker-end="url(#arw)"/>

  <!-- Manager card -->
  <rect x="510" y="600" width="410" height="120" rx="20" fill="rgba(255,255,255,0.035)" stroke="rgba(255,255,255,0.10)" stroke-width="1.5"/>
  <rect x="510" y="600" width="6" height="120" rx="3" fill="url(#coolGrad)"/>
  <text x="550" y="656" font-size="30">👤</text>
  <text x="600" y="654" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="24" font-weight="800" fill="#EEF0FA">Manager decides</text>
  <text x="550" y="694" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="18" fill="#A6ADC8">MANAGER / OWNER role · one click · optional note</text>

  <!-- Outcome branches -->
  <line x1="920" y1="360" x2="988" y2="345" stroke="#8891AE" stroke-width="2" marker-end="url(#arw)"/>
  <line x1="920" y1="410" x2="988" y2="480" stroke="#8891AE" stroke-width="2" marker-end="url(#arw)"/>
  <line x1="920" y1="460" x2="988" y2="615" stroke="#8891AE" stroke-width="2" marker-end="url(#arw)"/>

  <rect x="1000" y="290" width="500" height="110" rx="18" fill="rgba(91,240,188,0.08)" stroke="rgba(91,240,188,0.30)" stroke-width="1.5"/>
  <rect x="1000" y="290" width="6" height="110" rx="3" fill="url(#mintGrad)"/>
  <text x="1036" y="342" font-size="28">✅</text>
  <text x="1084" y="338" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="24" font-weight="800" fill="#EEF0FA">approved → continue</text>
  <text x="1036" y="376" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="18" fill="#A6ADC8">agent resumes exactly where it paused</text>

  <rect x="1000" y="420" width="500" height="110" rx="18" fill="rgba(240,87,74,0.08)" stroke="rgba(240,87,74,0.30)" stroke-width="1.5"/>
  <rect x="1000" y="420" width="6" height="110" rx="3" fill="url(#coralGrad)"/>
  <text x="1036" y="472" font-size="28">🛑</text>
  <text x="1084" y="468" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="24" font-weight="800" fill="#EEF0FA">rejected → abort</text>
  <text x="1036" y="506" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="18" fill="#A6ADC8">the run stops; nothing is pushed</text>

  <rect x="1000" y="550" width="500" height="110" rx="18" fill="rgba(255,255,255,0.035)" stroke="rgba(245,166,35,0.30)" stroke-width="1.5"/>
  <rect x="1000" y="550" width="6" height="110" rx="3" fill="url(#amberGrad)"/>
  <text x="1036" y="602" font-size="28">⏱️</text>
  <text x="1084" y="598" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="24" font-weight="800" fill="#EEF0FA">timeout → agent's call</text>
  <text x="1036" y="636" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="18" fill="#A6ADC8">window expired — abort or retry</text>

  <!-- Audit strip -->
  <rect x="100" y="732" width="1400" height="58" rx="16" fill="rgba(255,255,255,0.035)" stroke="rgba(255,255,255,0.10)" stroke-width="1.5"/>
  <rect x="100" y="732" width="6" height="58" rx="3" fill="url(#violetGrad)"/>
  <text x="140" y="769" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="19" fill="#A6ADC8">Audit trail — who requested · who decided · when · review note — permanent and immutable at /admin</text>

  <g opacity="0.85">
    <circle cx="1336" cy="852" r="9" fill="url(#violetGrad)"/>
    <text x="1354" y="859" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="20" font-weight="700" fill="#A6ADC8">Builderforce.ai</text>
  </g>
  <text x="80" y="858" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="17" fill="#717892">Gate on blast radius, not frequency — approval authority maps to deploy access</text>
</svg>
