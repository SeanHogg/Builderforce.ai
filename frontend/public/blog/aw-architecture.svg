  <line x1="430" y1="450" x2="690" y2="450" stroke="url(#hairline)" stroke-width="3"/><line x1="930" y1="450" x2="1190" y2="450" stroke="url(#hairline)" stroke-width="3"/><circle cx="300" cy="450" r="118" fill="url(#coolGrad)" opacity="0.16"/><circle cx="300" cy="450" r="118" fill="none" stroke="url(#coolGrad)" stroke-width="2.5"/><circle cx="300" cy="450" r="74" fill="url(#coolGrad)"/><text x="300" y="458" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="22" font-weight="900" fill="#0A0B1E">Reason</text><text x="300" y="282" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="19" letter-spacing="3" font-weight="800" fill="#A6ADC8">CORTEX</text><text x="300" y="638" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="26" font-weight="800" fill="#EEF0FA">Evermind generator</text><text x="300" y="676" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="18" fill="#A6ADC8"><tspan x="300" dy="0">Reasoning &amp; language — your own</tspan><tspan x="300" dy="26">model, never frozen</tspan></text><circle cx="800" cy="450" r="118" fill="url(#violetGrad)" opacity="0.16"/><circle cx="800" cy="450" r="118" fill="none" stroke="url(#violetGrad)" stroke-width="2.5"/><circle cx="800" cy="450" r="74" fill="url(#violetGrad)"/><text x="800" y="458" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="22" font-weight="900" fill="#0A0B1E">Recall</text><text x="800" y="282" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="19" letter-spacing="3" font-weight="800" fill="#A6ADC8">HIPPOCAMPUS</text><text x="800" y="638" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="26" font-weight="800" fill="#EEF0FA">Evermind SSM</text><text x="800" y="676" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="18" fill="#A6ADC8"><tspan x="800" dy="0">Self-updating memory —</tspan><tspan x="800" dy="26">write-through, always current</tspan></text><circle cx="1300" cy="450" r="118" fill="url(#mintGrad)" opacity="0.16"/><circle cx="1300" cy="450" r="118" fill="none" stroke="url(#mintGrad)" stroke-width="2.5"/><circle cx="1300" cy="450" r="74" fill="url(#mintGrad)"/><text x="1300" y="458" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="22" font-weight="900" fill="#0A0B1E">Feel</text><text x="1300" y="282" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="19" letter-spacing="3" font-weight="800" fill="#A6ADC8">LIMBIC</text><text x="1300" y="638" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="26" font-weight="800" fill="#EEF0FA">Affective layer</text><text x="1300" y="676" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="18" fill="#A6ADC8"><tspan x="1300" dy="0">Personality as setpoints, state as</tspan><tspan x="1300" dy="26">dynamics</tspan></text><rect x="80" y="742" width="1440" height="92" rx="16" fill="rgba(139,108,255,0.08)" stroke="rgba(139,108,255,0.3)" stroke-width="1.5"/><text x="112" y="788" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="20" font-weight="800" fill="#A98BFF">Shared-expert hybrid generator</text><text x="112" y="817" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="17" fill="#A6ADC8">A dense always-on backbone carries continuous online learning · lazily-loaded routed SSM experts page in on demand · WebGPU, zero runtime deps.</text>
