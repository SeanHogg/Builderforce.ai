<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="0%" r="120%">
      <stop offset="0%" stop-color="#1B1F46"/>
      <stop offset="55%" stop-color="#13152F"/>
      <stop offset="100%" stop-color="#0A0B1E"/>
    </radialGradient>
    <linearGradient id="violetGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A98BFF"/><stop offset="100%" stop-color="#6A4DF0"/>
    </linearGradient>
    <linearGradient id="coolGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3DD6F5"/><stop offset="100%" stop-color="#4F8BFF"/>
    </linearGradient>
    <linearGradient id="mintGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5BF0BC"/><stop offset="100%" stop-color="#23B987"/>
    </linearGradient>
    <linearGradient id="hairline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(139,108,255,0)"/>
      <stop offset="50%" stop-color="rgba(139,108,255,0.55)"/>
      <stop offset="100%" stop-color="rgba(61,214,245,0)"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bgGlow)"/>

  <text x="80" y="92" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="20" letter-spacing="3" font-weight="700" fill="#A98BFF">DIRECTED MESSAGES</text>
  <text x="80" y="146" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="46" font-weight="800" fill="#EEF0FA">A message has a recipient</text>
  <rect x="82" y="170" width="120" height="4" rx="2" fill="url(#hairline)"/>

  <!-- Composer -->
  <rect x="600" y="240" width="400" height="96" rx="20" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <text x="800" y="288" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="24" font-weight="800" fill="#EEF0FA">You type in the thread</text>
  <text x="800" y="318" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="18" fill="#A6ADC8">To: pick a participant, or start with @name</text>

  <!-- split arrows -->
  <g stroke="rgba(255,255,255,0.18)" stroke-width="2" fill="none">
    <path d="M700,340 C560,420 460,440 420,500"/>
    <path d="M900,340 C1040,420 1140,440 1180,500"/>
  </g>

  <!-- Lane: to human -->
  <rect x="120" y="500" width="600" height="300" rx="24" fill="rgba(91,240,188,0.06)" stroke="rgba(91,240,188,0.35)" stroke-width="1.5"/>
  <rect x="120" y="500" width="600" height="6" rx="3" fill="url(#mintGrad)"/>
  <text x="160" y="562" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="30">🧑</text>
  <text x="210" y="562" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="28" font-weight="900" fill="#EEF0FA">→ To a human</text>
  <text x="160" y="616" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="21" fill="#A6ADC8"><tspan x="160" dy="0">Delivered and persisted as a</tspan><tspan x="160" dy="30">person-to-person message.</tspan></text>
  <rect x="160" y="678" width="520" height="88" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.10)"/>
  <text x="184" y="716" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="20" font-weight="700" fill="#5BF0BC">Agent loop stays idle</text>
  <text x="184" y="746" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="18" fill="#A6ADC8">No model runs — it's just people talking.</text>

  <!-- Lane: to agent -->
  <rect x="880" y="500" width="600" height="300" rx="24" fill="rgba(61,214,245,0.06)" stroke="rgba(61,214,245,0.35)" stroke-width="1.5"/>
  <rect x="880" y="500" width="600" height="6" rx="3" fill="url(#coolGrad)"/>
  <text x="920" y="562" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="30">🤖</text>
  <text x="970" y="562" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="28" font-weight="900" fill="#EEF0FA">→ To an @agent</text>
  <text x="920" y="616" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="21" fill="#A6ADC8"><tspan x="920" dy="0">The agent replies as itself and runs a</tspan><tspan x="920" dy="30">bounded, permission-scoped tool loop.</tspan></text>
  <rect x="920" y="678" width="520" height="88" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.10)"/>
  <text x="944" y="716" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="20" font-weight="700" fill="#3DD6F5">Creates tasks · updates OKRs · reads board</text>
  <text x="944" y="746" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="18" fill="#A6ADC8">With your role + token — never more access than you.</text>

  <g opacity="0.85">
    <circle cx="1336" cy="852" r="9" fill="url(#violetGrad)"/>
    <text x="1354" y="859" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="20" font-weight="700" fill="#A6ADC8">Builderforce.ai</text>
  </g>
  <text x="80" y="858" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="17" fill="#717892">Multi-party chat: humans and agents in one thread</text>
</svg>
