<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 360" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#8FA0BD"/>
    </marker>
  </defs>
  <rect width="860" height="360" fill="#0E1525"/>
  <text x="430" y="40" fill="#FFFFFF" font-size="22" font-weight="700" text-anchor="middle">Hybrid retrieval — dense + sparse, fused and reranked</text>

  <!-- query -->
  <rect x="30" y="150" width="120" height="60" rx="10" fill="#1f8f63"/>
  <text x="90" y="178" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">Query</text>
  <text x="90" y="198" fill="#bff3df" font-size="11" text-anchor="middle">text + embedding</text>

  <!-- dense -->
  <rect x="220" y="78" width="190" height="64" rx="10" fill="#15203A" stroke="#FF6B5C"/>
  <text x="315" y="104" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">Dense — cosine</text>
  <text x="315" y="124" fill="#9fb0cd" font-size="11" text-anchor="middle">SSM / OpenAI embeddings</text>

  <!-- sparse -->
  <rect x="220" y="218" width="190" height="64" rx="10" fill="#15203A" stroke="#FF6B5C"/>
  <text x="315" y="244" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">Sparse — BM25</text>
  <text x="315" y="264" fill="#9fb0cd" font-size="11" text-anchor="middle">exact tokens, codes, names</text>

  <!-- fuse -->
  <rect x="470" y="148" width="160" height="64" rx="10" fill="#15203A" stroke="#3FE0A5"/>
  <text x="550" y="174" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">RRF fusion</text>
  <text x="550" y="194" fill="#9fb0cd" font-size="11" text-anchor="middle">rank-based merge</text>

  <!-- rerank -->
  <rect x="680" y="148" width="150" height="64" rx="10" fill="#15203A" stroke="#3FE0A5"/>
  <text x="755" y="174" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">MMR rerank</text>
  <text x="755" y="194" fill="#9fb0cd" font-size="11" text-anchor="middle">relevance + novelty</text>

  <!-- arrows -->
  <g stroke="#8FA0BD" stroke-width="2" fill="none">
    <path d="M150,170 C185,150 185,120 218,110" marker-end="url(#arr)"/>
    <path d="M150,190 C185,210 185,240 218,250" marker-end="url(#arr)"/>
    <path d="M410,110 C440,130 440,150 468,162" marker-end="url(#arr)"/>
    <path d="M410,250 C440,230 440,210 468,198" marker-end="url(#arr)"/>
    <path d="M630,180 L676,180" marker-end="url(#arr)"/>
  </g>

  <text x="430" y="332" fill="#52617d" font-size="12" text-anchor="middle">Degrades gracefully: no embedding → BM25-only · no lexical overlap → dense-only</text>
</svg>
