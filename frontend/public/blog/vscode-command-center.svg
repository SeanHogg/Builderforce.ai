<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="0%" r="120%">
      <stop offset="0%" stop-color="#1B1F46"/>
      <stop offset="55%" stop-color="#13152F"/>
      <stop offset="100%" stop-color="#0A0B1E"/>
    </radialGradient>
    <linearGradient id="violetGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A98BFF"/><stop offset="100%" stop-color="#6A4DF0"/>
    </linearGradient>
    <linearGradient id="coolGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3DD6F5"/><stop offset="100%" stop-color="#4F8BFF"/>
    </linearGradient>
    <linearGradient id="hairline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(139,108,255,0)"/>
      <stop offset="50%" stop-color="rgba(139,108,255,0.55)"/>
      <stop offset="100%" stop-color="rgba(61,214,245,0)"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bgGlow)"/>

  <text x="80" y="92" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="20" letter-spacing="3" font-weight="700" fill="#3DD6F5">VS CODE</text>
  <text x="80" y="146" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="46" font-weight="800" fill="#EEF0FA">Your whole workforce, one panel away</text>
  <rect x="82" y="170" width="120" height="4" rx="2" fill="url(#hairline)"/>

  <!-- editor window -->
  <rect x="120" y="230" width="1360" height="580" rx="20" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.10)" stroke-width="1.5"/>
  <!-- title dots -->
  <circle cx="156" cy="264" r="7" fill="#F0574A"/><circle cx="180" cy="264" r="7" fill="#F5B83D"/><circle cx="204" cy="264" r="7" fill="#5BF0BC"/>
  <line x1="120" y1="290" x2="1480" y2="290" stroke="rgba(255,255,255,0.08)"/>

  <!-- sidebar -->
  <rect x="120" y="290" width="470" height="520" fill="rgba(255,255,255,0.02)"/>
  <line x1="590" y1="290" x2="590" y2="810" stroke="rgba(255,255,255,0.08)"/>
  <text x="150" y="330" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="16" letter-spacing="1.5" font-weight="700" fill="#8891AE">BUILDERFORCE</text>

  <!-- sidebar items -->
  <g font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">
    <!-- Sessions -->
    <rect x="140" y="352" width="430" height="66" rx="12" fill="rgba(61,214,245,0.06)"/>
    <text x="164" y="393" font-size="26">💬</text>
    <text x="206" y="386" font-size="22" font-weight="700" fill="#EEF0FA">Sessions — team chat</text>
    <text x="206" y="410" font-size="16" fill="#8891AE">humans + @agents, directed messages</text>
    <circle cx="540" cy="385" r="10" fill="#3DD6F5"/>

    <!-- Project and Tasks -->
    <text x="164" y="466" font-size="26">▦</text>
    <text x="206" y="459" font-size="22" font-weight="700" fill="#EEF0FA">Project &amp; Tasks</text>
    <text x="206" y="483" font-size="16" fill="#8891AE">board + assigned work, live status</text>
    <text x="536" y="464" font-size="20" fill="#F5B83D">❓</text>

    <!-- Meetings -->
    <text x="164" y="536" font-size="26">🎥</text>
    <text x="206" y="529" font-size="22" font-weight="700" fill="#EEF0FA">Meetings</text>
    <text x="206" y="553" font-size="16" fill="#8891AE">join in browser · join here (native)</text>
    <circle cx="540" cy="528" r="7" fill="#F0574A"/><text x="524" y="533" font-size="14" fill="#FF8F7A">live</text>

    <!-- Evermind -->
    <text x="164" y="606" font-size="26">🧠</text>
    <text x="206" y="599" font-size="22" font-weight="700" fill="#EEF0FA">Evermind</text>
    <text x="206" y="623" font-size="16" fill="#8891AE">inspect &amp; train your project's model</text>

    <!-- Inbox -->
    <text x="164" y="676" font-size="26">📥</text>
    <text x="206" y="669" font-size="22" font-weight="700" fill="#EEF0FA">Inbox — approvals</text>
    <text x="206" y="693" font-size="16" fill="#8891AE">human-in-the-loop sign-off</text>

    <!-- Insights / Diagnostics -->
    <text x="164" y="746" font-size="26">📊</text>
    <text x="206" y="739" font-size="22" font-weight="700" fill="#EEF0FA">Insights &amp; Diagnostics</text>
    <text x="206" y="763" font-size="16" fill="#8891AE">the operating picture + scans</text>
  </g>

  <!-- editor pane -->
  <g font-family="Consolas, ui-monospace, monospace" font-size="18" fill="#7E88A8">
    <text x="640" y="336">// approve the run, answer the question,</text>
    <text x="640" y="366">// join the standup — without leaving here</text>
    <text x="640" y="420" fill="#A98BFF">agent</text><text x="712" y="420" fill="#7E88A8">.</text><text x="722" y="420" fill="#3DD6F5">run</text><text x="762" y="420" fill="#7E88A8">(task)</text>
    <text x="640" y="452" fill="#5BF0BC">// ✓ executing — status shown in the tree</text>
  </g>
  <rect x="640" y="500" width="800" height="280" rx="16" fill="rgba(169,139,255,0.06)" stroke="rgba(169,139,255,0.22)"/>
  <text x="672" y="548" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="22" font-weight="800" fill="#EEF0FA">Governed, and yours</text>
  <g font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="19" fill="#A6ADC8">
    <text x="672" y="592">✔ Approval gates + full audit trail on every action</text>
    <text x="672" y="628">✔ Per-tenant isolation — the same system of record as web</text>
    <text x="672" y="664">✔ Bring your own model (Anthropic · OpenAI · Google)</text>
    <text x="672" y="700">✔ Live status: which run is executing or needs your answer</text>
    <text x="672" y="736">✔ Nothing here is a second-class copy of the web app</text>
  </g>

  <g opacity="0.85">
    <circle cx="1336" cy="852" r="9" fill="url(#violetGrad)"/>
    <text x="1354" y="859" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="20" font-weight="700" fill="#A6ADC8">Builderforce.ai</text>
  </g>
  <text x="80" y="858" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="17" fill="#717892">A command center for a workforce of humans and AI agents</text>
</svg>
