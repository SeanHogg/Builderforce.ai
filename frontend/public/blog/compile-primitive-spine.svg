<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 540" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <linearGradient id="cp-coral" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FF6B5C"/>
      <stop offset="1" stop-color="#E8472F"/>
    </linearGradient>
    <marker id="cp-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#8FA0BD"/>
    </marker>
  </defs>
  <rect width="880" height="540" fill="#0E1525"/>
  <text x="440" y="46" fill="#FFFFFF" font-size="25" font-weight="700" text-anchor="middle">The compile primitive — one spine under every agent</text>
  <text x="440" y="74" fill="#8FA0BD" font-size="14" text-anchor="middle">compile(need) → AgentSpec → deploy(surface)</text>

  <!-- Left: needs / modalities -->
  <text x="135" y="116" fill="#8FA0BD" font-size="13" text-anchor="middle" font-weight="700">A NEED, IN ANY MODALITY</text>
  <g font-size="13">
    <rect x="40" y="130" width="190" height="42" rx="9" fill="#15203A" stroke="#26324f"/>
    <text x="58" y="156" fill="#DCE6F7">Plain language</text>
    <rect x="40" y="180" width="190" height="42" rx="9" fill="#15203A" stroke="#26324f"/>
    <text x="58" y="206" fill="#DCE6F7">Dataset + your docs</text>
    <rect x="40" y="230" width="190" height="42" rx="9" fill="#15203A" stroke="#26324f"/>
    <text x="58" y="256" fill="#DCE6F7">Process chart</text>
    <rect x="40" y="280" width="190" height="42" rx="9" fill="#15203A" stroke="#26324f"/>
    <text x="58" y="306" fill="#DCE6F7">Persona</text>
    <rect x="40" y="330" width="190" height="42" rx="9" fill="#15203A" stroke="#26324f"/>
    <text x="58" y="356" fill="#DCE6F7">Diagnostic finding</text>
    <rect x="40" y="380" width="190" height="42" rx="9" fill="#15203A" stroke="#26324f"/>
    <text x="58" y="406" fill="#DCE6F7">Policy pack</text>
  </g>

  <!-- compile() -->
  <rect x="262" y="200" width="118" height="140" rx="12" fill="url(#cp-coral)"/>
  <text x="321" y="262" fill="#fff" font-size="16" font-weight="700" text-anchor="middle">compile()</text>
  <text x="321" y="284" fill="#ffe2dc" font-size="11" text-anchor="middle">modality</text>
  <text x="321" y="299" fill="#ffe2dc" font-size="11" text-anchor="middle">registry</text>
  <g stroke="#8FA0BD" stroke-width="1.5" fill="none">
    <path d="M232 151 H250 Q262 151 262 200 V224" marker-end="url(#cp-arrow)"/>
    <path d="M232 201 H262" marker-end="url(#cp-arrow)"/>
    <path d="M232 251 H262" marker-end="url(#cp-arrow)"/>
    <path d="M232 301 H262" marker-end="url(#cp-arrow)"/>
    <path d="M232 351 H250 Q262 351 262 320 V296" marker-end="url(#cp-arrow)"/>
    <path d="M232 401 H250 Q262 401 262 340 V322" marker-end="url(#cp-arrow)"/>
  </g>

  <!-- AgentSpec -->
  <rect x="410" y="170" width="190" height="200" rx="12" fill="#13233f" stroke="url(#cp-coral)" stroke-width="2"/>
  <text x="505" y="198" fill="#fff" font-size="16" font-weight="700" text-anchor="middle">AgentSpec</text>
  <text x="505" y="216" fill="#8FA0BD" font-size="11" text-anchor="middle">the canonical IR</text>
  <g font-size="12.5" fill="#DCE6F7">
    <text x="428" y="244">· identity + model</text>
    <text x="428" y="268">· persona (directives)</text>
    <text x="428" y="292">· recalled memory</text>
    <text x="428" y="316">· policy gates</text>
    <text x="428" y="340">· steps + surfaces</text>
  </g>
  <line x1="380" y1="270" x2="410" y2="270" stroke="#8FA0BD" stroke-width="1.5" marker-end="url(#cp-arrow)"/>

  <!-- deploy() -->
  <rect x="630" y="200" width="118" height="140" rx="12" fill="url(#cp-coral)"/>
  <text x="689" y="262" fill="#fff" font-size="16" font-weight="700" text-anchor="middle">deploy()</text>
  <text x="689" y="284" fill="#ffe2dc" font-size="11" text-anchor="middle">surface</text>
  <text x="689" y="299" fill="#ffe2dc" font-size="11" text-anchor="middle">registry</text>
  <line x1="600" y1="270" x2="630" y2="270" stroke="#8FA0BD" stroke-width="1.5" marker-end="url(#cp-arrow)"/>

  <!-- Right: surfaces -->
  <text x="800" y="116" fill="#8FA0BD" font-size="13" text-anchor="middle" font-weight="700">ON ANY SURFACE</text>
  <g font-size="13">
    <rect x="770" y="150" width="78" height="40" rx="9" fill="#15203A" stroke="#26324f"/>
    <text x="809" y="175" fill="#DCE6F7" text-anchor="middle">IDE</text>
    <rect x="770" y="198" width="78" height="40" rx="9" fill="#15203A" stroke="#26324f"/>
    <text x="809" y="223" fill="#DCE6F7" text-anchor="middle">Desktop</text>
    <rect x="770" y="246" width="78" height="40" rx="9" fill="#15203A" stroke="#26324f"/>
    <text x="809" y="271" fill="#DCE6F7" text-anchor="middle">Cloud</text>
    <rect x="770" y="294" width="78" height="40" rx="9" fill="#15203A" stroke="#26324f"/>
    <text x="809" y="319" fill="#DCE6F7" text-anchor="middle">Container</text>
    <rect x="770" y="342" width="78" height="40" rx="9" fill="#15203A" stroke="#26324f"/>
    <text x="809" y="367" fill="#DCE6F7" text-anchor="middle">Workflow</text>
  </g>
  <g stroke="#8FA0BD" stroke-width="1.5" fill="none">
    <path d="M748 250 Q760 250 760 170 H770" marker-end="url(#cp-arrow)"/>
    <path d="M748 258 Q762 258 762 218 H770" marker-end="url(#cp-arrow)"/>
    <path d="M748 270 H770" marker-end="url(#cp-arrow)"/>
    <path d="M748 282 Q762 282 762 314 H770" marker-end="url(#cp-arrow)"/>
    <path d="M748 290 Q760 290 760 362 H770" marker-end="url(#cp-arrow)"/>
  </g>

  <text x="440" y="430" fill="#8FA0BD" font-size="13" text-anchor="middle">Compile many shapes in · one spec in the middle · deploy to many surfaces out</text>
  <rect x="150" y="456" width="580" height="52" rx="10" fill="#15203A" stroke="#26324f"/>
  <text x="440" y="479" fill="#FFD9D2" font-size="13" text-anchor="middle" font-weight="700">POST /api/compile  ·  POST /api/compile/run  ·  /compile (the plain-language front door)</text>
  <text x="440" y="498" fill="#8FA0BD" font-size="11.5" text-anchor="middle">live endpoints — type a need, get a running agent</text>
</svg>
