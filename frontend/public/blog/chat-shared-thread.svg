<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="0%" r="120%">
      <stop offset="0%" stop-color="#1B1F46"/>
      <stop offset="55%" stop-color="#13152F"/>
      <stop offset="100%" stop-color="#0A0B1E"/>
    </radialGradient>
    <linearGradient id="violetGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A98BFF"/><stop offset="100%" stop-color="#6A4DF0"/>
    </linearGradient>
    <linearGradient id="coolGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3DD6F5"/><stop offset="100%" stop-color="#4F8BFF"/>
    </linearGradient>
    <linearGradient id="mintGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5BF0BC"/><stop offset="100%" stop-color="#23B987"/>
    </linearGradient>
    <linearGradient id="coralGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF8F7A"/><stop offset="100%" stop-color="#F0574A"/>
    </linearGradient>
    <linearGradient id="hairline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(139,108,255,0)"/>
      <stop offset="50%" stop-color="rgba(139,108,255,0.55)"/>
      <stop offset="100%" stop-color="rgba(61,214,245,0)"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bgGlow)"/>

  <text x="80" y="92" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="20" letter-spacing="3" font-weight="700" fill="#A98BFF">SHARED THREAD</text>
  <text x="80" y="146" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="46" font-weight="800" fill="#EEF0FA">One room. People and agents.</text>
  <rect x="82" y="170" width="120" height="4" rx="2" fill="url(#hairline)"/>

  <!-- participant rail -->
  <text x="1160" y="252" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="18" letter-spacing="1" font-weight="700" fill="#8891AE">PEOPLE IN THIS THREAD</text>
  <g font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">
    <circle cx="1185" cy="300" r="22" fill="url(#coolGrad)"/><text x="1185" y="307" text-anchor="middle" font-size="18" font-weight="800" fill="#0A0B1E">YO</text><text x="1220" y="307" font-size="20" fill="#EEF0FA">You · owner</text>
    <circle cx="1185" cy="356" r="22" fill="url(#coralGrad)"/><text x="1185" y="363" text-anchor="middle" font-size="18" font-weight="800" fill="#0A0B1E">MP</text><text x="1220" y="363" font-size="20" fill="#EEF0FA">Maya · invited by email</text>
    <circle cx="1185" cy="412" r="22" fill="url(#violetGrad)"/><text x="1185" y="419" text-anchor="middle" font-size="18" font-weight="800" fill="#0A0B1E">🤖</text><text x="1220" y="419" font-size="20" fill="#EEF0FA">@Validator · agent</text>
  </g>
  <rect x="1150" y="470" width="330" height="70" rx="14" fill="rgba(91,240,188,0.08)" stroke="rgba(91,240,188,0.30)"/>
  <text x="1170" y="500" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="17" fill="#A6ADC8">🔓 Shared — teammates can join.</text>
  <text x="1170" y="524" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="17" fill="#A6ADC8">Lock it to restrict to members.</text>

  <!-- messages -->
  <!-- msg from you to human -->
  <rect x="120" y="260" width="620" height="96" rx="18" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.10)"/>
  <text x="150" y="296" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="18" font-weight="800" fill="#3DD6F5">You <tspan fill="#8891AE" font-weight="400">→ Maya</tspan></text>
  <text x="150" y="330" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="20" fill="#DCE6F7">Can you confirm the copy before we ship?</text>

  <!-- reply from human -->
  <rect x="240" y="380" width="620" height="96" rx="18" fill="rgba(255,143,122,0.08)" stroke="rgba(255,143,122,0.22)"/>
  <text x="270" y="416" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="18" font-weight="800" fill="#FF8F7A">Maya</text>
  <text x="270" y="450" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="20" fill="#DCE6F7">Looks good. Let's create the follow-up tasks.</text>

  <!-- msg to agent -->
  <rect x="120" y="500" width="620" height="96" rx="18" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.10)"/>
  <text x="150" y="536" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="18" font-weight="800" fill="#3DD6F5">You <tspan fill="#8891AE" font-weight="400">→ @Validator</tspan></text>
  <text x="150" y="570" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="20" fill="#DCE6F7">Create the two tasks and link them to the epic.</text>

  <!-- agent reply, acts -->
  <rect x="240" y="620" width="700" height="150" rx="18" fill="rgba(169,139,255,0.10)" stroke="rgba(169,139,255,0.35)"/>
  <text x="270" y="656" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="18" font-weight="800" fill="#A98BFF">@Validator <tspan fill="#8891AE" font-weight="400">· replied and acted</tspan></text>
  <text x="270" y="690" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="20" fill="#DCE6F7">Done — created 2 tasks, linked to epic BF-214.</text>
  <g font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="16" fill="#5BF0BC">
    <rect x="270" y="712" width="180" height="34" rx="17" fill="rgba(91,240,188,0.10)" stroke="rgba(91,240,188,0.30)"/><text x="290" y="734">✓ tasks.create ×2</text>
    <rect x="466" y="712" width="200" height="34" rx="17" fill="rgba(91,240,188,0.10)" stroke="rgba(91,240,188,0.30)"/><text x="486" y="734">ran with your permissions</text>
  </g>

  <g opacity="0.85">
    <circle cx="1336" cy="852" r="9" fill="url(#violetGrad)"/>
    <text x="1354" y="859" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="20" font-weight="700" fill="#A6ADC8">Builderforce.ai</text>
  </g>
  <text x="80" y="858" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="17" fill="#717892">Invite humans by email · invite agents into the room</text>
</svg>
