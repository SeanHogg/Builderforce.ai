<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="0%" r="120%">
      <stop offset="0%" stop-color="#1B1F46"/><stop offset="55%" stop-color="#13152F"/><stop offset="100%" stop-color="#0A0B1E"/>
    </radialGradient>
    <linearGradient id="violetGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#A98BFF"/><stop offset="100%" stop-color="#6A4DF0"/></linearGradient>
    <linearGradient id="coolGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#3DD6F5"/><stop offset="100%" stop-color="#4F8BFF"/></linearGradient>
    <linearGradient id="mintGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#5BF0BC"/><stop offset="100%" stop-color="#23B987"/></linearGradient>
    <linearGradient id="coralGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FF8F7A"/><stop offset="100%" stop-color="#F0574A"/></linearGradient>
    <linearGradient id="hairline" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="rgba(139,108,255,0)"/><stop offset="50%" stop-color="rgba(139,108,255,0.55)"/><stop offset="100%" stop-color="rgba(61,214,245,0)"/></linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bgGlow)"/>
  <text x="80" y="92" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="20" letter-spacing="3" font-weight="700" fill="#A98BFF">MODEL-AGNOSTIC, MULTI-AGENT DELIVERY</text>
  <text x="80" y="146" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="46" font-weight="800" fill="#EEF0FA">One Anthropic agent vs. a governed, any-model team</text>
  <rect x="82" y="170" width="120" height="4" rx="2" fill="url(#hairline)"/>

  <!-- Left card: Claude Code -->
  <rect x="80" y="210" width="560" height="560" rx="24" fill="rgba(255,255,255,0.035)" stroke="rgba(255,255,255,0.10)" stroke-width="1.5"/>
  <rect x="80" y="210" width="6" height="560" rx="3" fill="url(#coolGrad)"/>
  <text x="118" y="254" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="18" letter-spacing="2" font-weight="700" fill="#4F8BFF">CLAUDE CODE</text>
  <text x="118" y="296" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="28" font-weight="900" fill="#EEF0FA">One vendor, one agent</text>

  <rect x="300" y="322" width="120" height="52" rx="14" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
  <text x="360" y="355" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="20" font-weight="700" fill="#EEF0FA">Task</text>
  <line x1="360" y1="374" x2="360" y2="416" stroke="#4F8BFF" stroke-width="2.5"/>
  <path d="M360 418 l-6 -12 h12 z" fill="#4F8BFF"/>
  <rect x="285" y="420" width="150" height="52" rx="14" fill="rgba(61,214,245,0.12)" stroke="rgba(61,214,245,0.45)" stroke-width="1.5"/>
  <text x="360" y="453" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="20" font-weight="700" fill="#3DD6F5">Anthropic</text>
  <text x="360" y="500" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="15" fill="#8891AE">Locked to one model vendor</text>

  <line x1="110" y1="528" x2="610" y2="528" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="120" y="576" font-size="24" fill="#F0574A">&#10007;</text>
  <text x="158" y="576" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="21" fill="#A6ADC8">Single terminal agent</text>
  <text x="120" y="630" font-size="24" fill="#F0574A">&#10007;</text>
  <text x="158" y="630" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="21" fill="#A6ADC8">Inline, single-pass review</text>
  <text x="120" y="684" font-size="24" fill="#F0574A">&#10007;</text>
  <text x="158" y="684" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="21" fill="#A6ADC8">No governance, in-session memory</text>

  <!-- Right card: Builderforce -->
  <rect x="680" y="210" width="840" height="560" rx="24" fill="rgba(91,240,188,0.07)" stroke="rgba(91,240,188,0.40)" stroke-width="1.5"/>
  <rect x="680" y="210" width="6" height="560" rx="3" fill="url(#mintGrad)"/>
  <text x="718" y="254" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="18" letter-spacing="2" font-weight="700" fill="#5BF0BC">BUILDERFORCE.AI</text>
  <text x="718" y="296" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="28" font-weight="900" fill="#EEF0FA">Route every task to the best model</text>

  <rect x="1016" y="322" width="120" height="52" rx="14" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.22)" stroke-width="1.5"/>
  <text x="1076" y="355" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="20" font-weight="700" fill="#EEF0FA">Task</text>
  <line x1="1076" y1="374" x2="772" y2="414" stroke="#5BF0BC" stroke-width="2" opacity="0.8"/>
  <line x1="1076" y1="374" x2="920" y2="414" stroke="#5BF0BC" stroke-width="2" opacity="0.8"/>
  <line x1="1076" y1="374" x2="1068" y2="414" stroke="#5BF0BC" stroke-width="2" opacity="0.8"/>
  <line x1="1076" y1="374" x2="1216" y2="414" stroke="#5BF0BC" stroke-width="2" opacity="0.8"/>
  <line x1="1076" y1="374" x2="1380" y2="414" stroke="#5BF0BC" stroke-width="2" opacity="0.8"/>
  <rect x="702" y="416" width="140" height="50" rx="13" fill="rgba(255,255,255,0.05)" stroke="rgba(91,240,188,0.35)" stroke-width="1.3"/>
  <text x="772" y="447" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="18" font-weight="700" fill="#EEF0FA">Anthropic</text>
  <rect x="850" y="416" width="140" height="50" rx="13" fill="rgba(255,255,255,0.05)" stroke="rgba(91,240,188,0.35)" stroke-width="1.3"/>
  <text x="920" y="447" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="18" font-weight="700" fill="#EEF0FA">OpenAI</text>
  <rect x="998" y="416" width="140" height="50" rx="13" fill="rgba(255,255,255,0.05)" stroke="rgba(91,240,188,0.35)" stroke-width="1.3"/>
  <text x="1068" y="447" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="18" font-weight="700" fill="#EEF0FA">Bedrock</text>
  <rect x="1146" y="416" width="140" height="50" rx="13" fill="rgba(91,240,188,0.14)" stroke="rgba(91,240,188,0.55)" stroke-width="1.5"/>
  <text x="1216" y="440" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="18" font-weight="700" fill="#5BF0BC">Ollama</text>
  <text x="1216" y="459" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="12" fill="#5BF0BC">local, private</text>
  <rect x="1310" y="416" width="140" height="50" rx="13" fill="rgba(169,139,255,0.12)" stroke="rgba(169,139,255,0.45)" stroke-width="1.5"/>
  <text x="1380" y="447" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="18" font-weight="700" fill="#A98BFF">+26 more</text>
  <text x="1076" y="500" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="15" fill="#8891AE">Learns which model wins per task &#8212; exhausts cheap before premium</text>

  <line x1="718" y1="528" x2="1490" y2="528" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="720" y="576" font-size="24" fill="#5BF0BC">&#10003;</text>
  <text x="760" y="576" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="21" fill="#EEF0FA">7 specialist roles + dependency DAG</text>
  <text x="720" y="630" font-size="24" fill="#5BF0BC">&#10003;</text>
  <text x="760" y="630" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="21" fill="#EEF0FA">Adversarial review + self-healing recovery</text>
  <text x="720" y="684" font-size="24" fill="#5BF0BC">&#10003;</text>
  <text x="760" y="684" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="21" fill="#EEF0FA">Approval gates + full audit trail, persistent memory</text>

  <g opacity="0.85">
    <circle cx="1336" cy="852" r="9" fill="url(#violetGrad)"/>
    <text x="1354" y="859" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="20" font-weight="700" fill="#A6ADC8">Builderforce.ai</text>
  </g>
  <text x="80" y="858" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="17" fill="#717892">Anthropic stays first-class &#8212; just one option in a governed workflow, not the only one</text>
