    <text x="452" y="392"><tspan fill="#A98BFF">export async function</tspan><tspan fill="#3DD6F5"> GET</tspan><tspan fill="#7E88A8">(req) {</tspan></text>
    <text x="480" y="424"><tspan fill="#7E88A8">const rows = </tspan><tspan fill="#A98BFF">await</tspan><tspan fill="#7E88A8"> db.query(sql)</tspan></text>
    <text x="480" y="456"><tspan fill="#A98BFF">return</tspan><tspan fill="#7E88A8"> Response.json(rows)</tspan></text>
    <text x="452" y="488" fill="#7E88A8">}</text>
