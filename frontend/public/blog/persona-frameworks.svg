<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="820" viewBox="0 0 1600 820">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="0%" r="120%">
      <stop offset="0%" stop-color="#1B1F46"/>
      <stop offset="55%" stop-color="#13152F"/>
      <stop offset="100%" stop-color="#0A0B1E"/>
    </radialGradient>
    <linearGradient id="violetGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A98BFF"/><stop offset="100%" stop-color="#6A4DF0"/>
    </linearGradient>
    <linearGradient id="coolGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3DD6F5"/><stop offset="100%" stop-color="#4F8BFF"/>
    </linearGradient>
    <linearGradient id="mintGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5BF0BC"/><stop offset="100%" stop-color="#23B987"/>
    </linearGradient>
    <linearGradient id="hairline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(139,108,255,0)"/>
      <stop offset="50%" stop-color="rgba(139,108,255,0.55)"/>
      <stop offset="100%" stop-color="rgba(61,214,245,0)"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="820" fill="url(#bgGlow)"/>

  <text x="80" y="92" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="20" letter-spacing="3" font-weight="700" fill="#3DD6F5">MANY FRAMEWORKS, ONE PROFILE</text>
  <text x="80" y="146" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="46" font-weight="800" fill="#EEF0FA">Assess with the model you trust</text>
  <rect x="82" y="170" width="120" height="4" rx="2" fill="url(#hairline)"/>

  <!-- framework chips (left) -->
  <g font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">
    <rect x="120" y="250" width="360" height="66" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.10)"/><text x="150" y="292" font-size="22" fill="#EEF0FA">HEXACO personality</text>
    <rect x="120" y="330" width="360" height="66" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.10)"/><text x="150" y="372" font-size="22" fill="#EEF0FA">Enneagram · 9 types</text>
    <rect x="120" y="410" width="360" height="66" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.10)"/><text x="150" y="452" font-size="22" fill="#EEF0FA">MBTI type</text>
    <rect x="120" y="490" width="360" height="66" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.10)"/><text x="150" y="532" font-size="22" fill="#EEF0FA">Regulatory focus</text>
    <rect x="120" y="570" width="360" height="66" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.10)"/><text x="150" y="612" font-size="22" fill="#EEF0FA">Conflict style · TKI</text>
    <rect x="120" y="650" width="360" height="66" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.10)"/><text x="150" y="692" font-size="22" fill="#EEF0FA">Schwartz values · Morals</text>
  </g>

  <!-- converging lines -->
  <g stroke="rgba(61,214,245,0.35)" stroke-width="2" fill="none">
    <path d="M480,283 C640,283 660,470 800,470"/>
    <path d="M480,363 C640,363 680,470 800,470"/>
    <path d="M480,443 C660,443 700,470 800,470"/>
    <path d="M480,523 C660,523 700,470 800,470"/>
    <path d="M480,603 C640,603 680,470 800,470"/>
    <path d="M480,683 C640,683 660,470 800,470"/>
  </g>

  <!-- unified profile (center) -->
  <circle cx="900" cy="470" r="110" fill="rgba(169,139,255,0.10)" stroke="url(#violetGrad)" stroke-width="2"/>
  <text x="900" y="456" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="24" font-weight="900" fill="#EEF0FA">One trait</text>
  <text x="900" y="488" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="24" font-weight="900" fill="#EEF0FA">vector</text>

  <!-- arrow to targets -->
  <path d="M1010,470 L1120,470" stroke="url(#mintGrad)" stroke-width="5" fill="none"/>
  <path d="M1112,458 L1138,470 L1112,482 Z" fill="#5BF0BC"/>

  <!-- targets (right) -->
  <g font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">
    <rect x="1160" y="360" width="320" height="90" rx="16" fill="rgba(91,240,188,0.08)" stroke="rgba(91,240,188,0.30)"/>
    <text x="1188" y="400" font-size="22" font-weight="800" fill="#5BF0BC">A persona</text>
    <text x="1188" y="430" font-size="17" fill="#A6ADC8">reusable across projects &amp; agents</text>
    <rect x="1160" y="470" width="320" height="90" rx="16" fill="rgba(61,214,245,0.08)" stroke="rgba(61,214,245,0.30)"/>
    <text x="1188" y="510" font-size="22" font-weight="800" fill="#3DD6F5">An agent</text>
    <text x="1188" y="540" font-size="17" fill="#A6ADC8">carried into every cloud run</text>
  </g>

  <g opacity="0.85">
    <circle cx="1336" cy="775" r="9" fill="url(#violetGrad)"/>
    <text x="1354" y="782" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="20" font-weight="700" fill="#A6ADC8">Builderforce.ai</text>
  </g>
  <text x="80" y="781" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="17" fill="#717892">Frameworks feed one vector; the vector drives one consistent behavior</text>
</svg>
