<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="740" viewBox="0 0 1600 740">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="0%" r="120%">
      <stop offset="0%" stop-color="#1B1F46"/>
      <stop offset="55%" stop-color="#13152F"/>
      <stop offset="100%" stop-color="#0A0B1E"/>
    </radialGradient>
    <linearGradient id="violetGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A98BFF"/><stop offset="100%" stop-color="#6A4DF0"/>
    </linearGradient>
    <linearGradient id="coolGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3DD6F5"/><stop offset="100%" stop-color="#4F8BFF"/>
    </linearGradient>
    <linearGradient id="mintGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5BF0BC"/><stop offset="100%" stop-color="#23B987"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFCE6B"/><stop offset="100%" stop-color="#F5A623"/>
    </linearGradient>
    <linearGradient id="hairline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(139,108,255,0)"/>
      <stop offset="50%" stop-color="rgba(139,108,255,0.55)"/>
      <stop offset="100%" stop-color="rgba(61,214,245,0)"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="740" fill="url(#bgGlow)"/>

  <text x="80" y="92" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="20" letter-spacing="3" font-weight="700" fill="#3DD6F5">LIVE STATUS</text>
  <text x="80" y="146" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="46" font-weight="800" fill="#EEF0FA">Which run needs you — at a glance</text>
  <rect x="82" y="170" width="120" height="4" rx="2" fill="url(#hairline)"/>
  <text x="80" y="212" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="20" fill="#A6ADC8">One server-side signal overlays a status on every session and task row, on every surface.</text>

  <!-- Executing -->
  <rect x="120" y="260" width="1360" height="120" rx="20" fill="rgba(61,214,245,0.06)" stroke="rgba(61,214,245,0.30)"/>
  <circle cx="196" cy="320" r="26" fill="none" stroke="url(#coolGrad)" stroke-width="6" stroke-dasharray="82 40"/>
  <text x="260" y="312" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="28" font-weight="800" fill="#EEF0FA">Executing</text>
  <text x="260" y="348" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="20" fill="#A6ADC8">Blue spinner — the agent is actively working (and keeps working when you switch chats).</text>

  <!-- Needs your answer -->
  <rect x="120" y="400" width="1360" height="120" rx="20" fill="rgba(245,166,35,0.07)" stroke="rgba(245,166,35,0.35)"/>
  <circle cx="196" cy="460" r="26" fill="url(#amberGrad)"/>
  <text x="196" y="469" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="28" font-weight="900" fill="#0A0B1E">?</text>
  <text x="260" y="452" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="28" font-weight="800" fill="#EEF0FA">Needs your answer</text>
  <text x="260" y="488" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="20" fill="#A6ADC8">Amber flag — the run paused on a question and is waiting for you to respond.</text>

  <!-- Done -->
  <rect x="120" y="540" width="1360" height="120" rx="20" fill="rgba(91,240,188,0.06)" stroke="rgba(91,240,188,0.30)"/>
  <circle cx="196" cy="600" r="26" fill="url(#mintGrad)"/>
  <path d="M184,600 l9,9 l17,-19" fill="none" stroke="#0A0B1E" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="260" y="592" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="28" font-weight="800" fill="#EEF0FA">Done</text>
  <text x="260" y="628" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="20" fill="#A6ADC8">Green check — the task is complete. The status follows a session wherever it's shown.</text>

  <g opacity="0.85">
    <circle cx="1336" cy="700" r="9" fill="url(#violetGrad)"/>
    <text x="1354" y="707" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="20" font-weight="700" fill="#A6ADC8">Builderforce.ai</text>
  </g>
  <text x="80" y="706" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="17" fill="#717892">Multitask across concurrent agent runs without losing the thread</text>
</svg>
