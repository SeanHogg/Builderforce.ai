<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="0%" r="120%">
      <stop offset="0%" stop-color="#1B1F46"/>
      <stop offset="55%" stop-color="#13152F"/>
      <stop offset="100%" stop-color="#0A0B1E"/>
    </radialGradient>
    <linearGradient id="violetGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A98BFF"/><stop offset="100%" stop-color="#6A4DF0"/>
    </linearGradient>
    <linearGradient id="coolGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3DD6F5"/><stop offset="100%" stop-color="#4F8BFF"/>
    </linearGradient>
    <linearGradient id="mintGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5BF0BC"/><stop offset="100%" stop-color="#23B987"/>
    </linearGradient>
    <linearGradient id="coralGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF8F7A"/><stop offset="100%" stop-color="#F0574A"/>
    </linearGradient>
    <linearGradient id="hairline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(139,108,255,0)"/>
      <stop offset="50%" stop-color="rgba(139,108,255,0.55)"/>
      <stop offset="100%" stop-color="rgba(61,214,245,0)"/>
    </linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bgGlow)"/>

  <text x="80" y="92" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="20" letter-spacing="3" font-weight="700" fill="#A98BFF">COLLABORATION</text>
  <text x="80" y="146" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="46" font-weight="800" fill="#EEF0FA">Four surfaces, one shared system of record</text>
  <rect x="82" y="170" width="120" height="4" rx="2" fill="url(#hairline)"/>

  <!-- Central hub -->
  <circle cx="800" cy="520" r="150" fill="rgba(139,108,255,0.10)" stroke="url(#violetGrad)" stroke-width="2"/>
  <circle cx="800" cy="520" r="150" fill="none" stroke="url(#violetGrad)" stroke-width="14" opacity="0.14" filter="url(#glow)"/>
  <text x="800" y="500" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="30" font-weight="900" fill="#EEF0FA">One board</text>
  <text x="800" y="540" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="30" font-weight="900" fill="#EEF0FA">Humans + agents</text>
  <text x="800" y="576" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="19" fill="#A6ADC8">instrumented &amp; governed</text>

  <!-- Connectors -->
  <g stroke="rgba(255,255,255,0.16)" stroke-width="2">
    <line x1="470" y1="330" x2="700" y2="450"/>
    <line x1="1130" y1="330" x2="900" y2="450"/>
    <line x1="470" y1="720" x2="700" y2="600"/>
    <line x1="1130" y1="720" x2="900" y2="600"/>
  </g>

  <!-- Card: Shared Board -->
  <g>
    <rect x="150" y="250" width="360" height="150" rx="20" fill="rgba(255,255,255,0.035)" stroke="rgba(255,255,255,0.10)" stroke-width="1.5"/>
    <rect x="150" y="250" width="6" height="150" rx="3" fill="url(#coolGrad)"/>
    <text x="196" y="308" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="38">▦</text>
    <text x="250" y="308" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="28" font-weight="800" fill="#EEF0FA">Shared Board</text>
    <text x="196" y="352" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="19" fill="#A6ADC8">People and agents are teammates</text>
    <text x="196" y="378" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="19" fill="#A6ADC8">on the same Kanban swimlanes.</text>
  </g>

  <!-- Card: Team Chat -->
  <g>
    <rect x="1090" y="250" width="360" height="150" rx="20" fill="rgba(255,255,255,0.035)" stroke="rgba(255,255,255,0.10)" stroke-width="1.5"/>
    <rect x="1090" y="250" width="6" height="150" rx="3" fill="url(#violetGrad)"/>
    <text x="1136" y="308" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="38">💬</text>
    <text x="1196" y="308" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="28" font-weight="800" fill="#EEF0FA">Team Chat</text>
    <text x="1136" y="352" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="19" fill="#A6ADC8">Address a message to a person</text>
    <text x="1136" y="378" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="19" fill="#A6ADC8">or to an @agent that replies.</text>
  </g>

  <!-- Card: Live Meetings -->
  <g>
    <rect x="150" y="640" width="360" height="150" rx="20" fill="rgba(255,255,255,0.035)" stroke="rgba(255,255,255,0.10)" stroke-width="1.5"/>
    <rect x="150" y="640" width="6" height="150" rx="3" fill="url(#coralGrad)"/>
    <text x="196" y="698" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="38">🎥</text>
    <text x="250" y="698" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="28" font-weight="800" fill="#EEF0FA">Live Meetings</text>
    <text x="196" y="742" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="19" fill="#A6ADC8">WebRTC standups and retros,</text>
    <text x="196" y="768" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="19" fill="#A6ADC8">cameras on the round-table.</text>
  </g>

  <!-- Card: Shared Calendar -->
  <g>
    <rect x="1090" y="640" width="360" height="150" rx="20" fill="rgba(255,255,255,0.035)" stroke="rgba(255,255,255,0.10)" stroke-width="1.5"/>
    <rect x="1090" y="640" width="6" height="150" rx="3" fill="url(#mintGrad)"/>
    <text x="1136" y="698" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="38">🗓️</text>
    <text x="1196" y="698" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="28" font-weight="800" fill="#EEF0FA">Shared Calendar</text>
    <text x="1136" y="742" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="19" fill="#A6ADC8">Availability windows and</text>
    <text x="1136" y="768" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="19" fill="#A6ADC8">&quot;Find a time&quot; that works.</text>
  </g>

  <g opacity="0.85">
    <circle cx="1336" cy="852" r="9" fill="url(#violetGrad)"/>
    <text x="1354" y="859" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="20" font-weight="700" fill="#A6ADC8">Builderforce.ai</text>
  </g>
  <text x="80" y="858" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="17" fill="#717892">Where humans and AI agents collaborate in real time</text>
</svg>
