<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="0%" r="120%">
      <stop offset="0%" stop-color="#1B1F46"/>
      <stop offset="55%" stop-color="#13152F"/>
      <stop offset="100%" stop-color="#0A0B1E"/>
    </radialGradient>
    <linearGradient id="violetGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A98BFF"/><stop offset="100%" stop-color="#6A4DF0"/>
    </linearGradient>
    <linearGradient id="coolGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3DD6F5"/><stop offset="100%" stop-color="#4F8BFF"/>
    </linearGradient>
    <linearGradient id="mintGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5BF0BC"/><stop offset="100%" stop-color="#23B987"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFCE6B"/><stop offset="100%" stop-color="#F5A623"/>
    </linearGradient>
    <linearGradient id="hairline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(139,108,255,0)"/>
      <stop offset="50%" stop-color="rgba(139,108,255,0.55)"/>
      <stop offset="100%" stop-color="rgba(61,214,245,0)"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bgGlow)"/>

  <text x="80" y="92" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="20" letter-spacing="3" font-weight="700" fill="#A98BFF">COBIT GOVERNANCE READINESS</text>
  <text x="80" y="146" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="46" font-weight="800" fill="#EEF0FA">Four objectives, one maturity score</text>
  <rect x="82" y="170" width="120" height="4" rx="2" fill="url(#hairline)"/>

  <!-- Quadrant cards -->
  <!-- Govern (EDM) -->
  <rect x="120" y="230" width="640" height="230" rx="22" fill="rgba(255,255,255,0.035)" stroke="rgba(255,255,255,0.10)" stroke-width="1.5"/>
  <rect x="120" y="230" width="6" height="230" rx="3" fill="url(#violetGrad)"/>
  <text x="160" y="292" font-size="34">🏛️</text>
  <text x="214" y="292" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="27" font-weight="900" fill="#EEF0FA">Govern — Evaluate, Direct, Monitor</text>
  <text x="160" y="336" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="19" fill="#A6ADC8"><tspan x="160" dy="0">A clear governance framework with defined decision</tspan><tspan x="160" dy="28">rights; leadership sets direction and reviews value.</tspan><tspan x="160" dy="28">Governance and management stay separate — both</tspan><tspan x="160" dy="28">accountable.</tspan></text>

  <!-- Risk (APO12) -->
  <rect x="840" y="230" width="640" height="230" rx="22" fill="rgba(255,255,255,0.035)" stroke="rgba(255,255,255,0.10)" stroke-width="1.5"/>
  <rect x="840" y="230" width="6" height="230" rx="3" fill="url(#amberGrad)"/>
  <text x="880" y="292" font-size="34">⚠️</text>
  <text x="934" y="292" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="27" font-weight="900" fill="#EEF0FA">Risk Management (APO12)</text>
  <text x="880" y="336" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="19" fill="#A6ADC8"><tspan x="880" dy="0">A maintained risk register; every risk has an owner</tspan><tspan x="880" dy="28">and a mitigation plan tracked to closure; a defined</tspan><tspan x="880" dy="28">risk appetite that decisions are made within.</tspan></text>

  <!-- Resource (APO07) -->
  <rect x="120" y="490" width="640" height="230" rx="22" fill="rgba(255,255,255,0.035)" stroke="rgba(255,255,255,0.10)" stroke-width="1.5"/>
  <rect x="120" y="490" width="6" height="230" rx="3" fill="url(#coolGrad)"/>
  <text x="160" y="552" font-size="34">👥</text>
  <text x="214" y="552" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="27" font-weight="900" fill="#EEF0FA">Resource Optimization (APO07)</text>
  <text x="160" y="596" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="19" fill="#A6ADC8"><tspan x="160" dy="0">Skills and capacity are known and planned against;</tspan><tspan x="160" dy="28">key-person risk is managed; vendors and external</tspan><tspan x="160" dy="28">resources — including AI agents — are measured.</tspan></text>

  <!-- Performance and Compliance (MEA) -->
  <rect x="840" y="490" width="640" height="230" rx="22" fill="rgba(255,255,255,0.035)" stroke="rgba(255,255,255,0.10)" stroke-width="1.5"/>
  <rect x="840" y="490" width="6" height="230" rx="3" fill="url(#mintGrad)"/>
  <text x="880" y="552" font-size="34">📈</text>
  <text x="934" y="552" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="27" font-weight="900" fill="#EEF0FA">Performance &amp; Compliance (MEA)</text>
  <text x="880" y="596" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="19" fill="#A6ADC8"><tspan x="880" dy="0">Performance is measured against goals and reported;</tspan><tspan x="880" dy="28">controls are monitored with an audit trail; compliance</tspan><tspan x="880" dy="28">evidence is produced on demand, no fire drill.</tspan></text>

  <!-- Maturity scale bar -->
  <text x="80" y="778" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="20" font-weight="700" fill="#8891AE">RATED 1–5:</text>
  <g font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="19">
    <rect x="240" y="756" width="200" height="34" rx="17" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)"/><text x="340" y="779" text-anchor="middle" fill="#A6ADC8">1 · Initial</text>
    <rect x="452" y="756" width="200" height="34" rx="17" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)"/><text x="552" y="779" text-anchor="middle" fill="#A6ADC8">2 · Managed</text>
    <rect x="664" y="756" width="200" height="34" rx="17" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)"/><text x="764" y="779" text-anchor="middle" fill="#A6ADC8">3 · Defined</text>
    <rect x="876" y="756" width="210" height="34" rx="17" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)"/><text x="981" y="779" text-anchor="middle" fill="#A6ADC8">4 · Quantified</text>
    <rect x="1098" y="756" width="210" height="34" rx="17" fill="rgba(91,240,188,0.10)" stroke="rgba(91,240,188,0.35)"/><text x="1203" y="779" text-anchor="middle" fill="#5BF0BC">5 · Optimizing</text>
  </g>

  <g opacity="0.85">
    <circle cx="1336" cy="852" r="9" fill="url(#violetGrad)"/>
    <text x="1354" y="859" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="20" font-weight="700" fill="#A6ADC8">Builderforce.ai</text>
  </g>
  <text x="80" y="858" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="17" fill="#717892">A free readiness assessment with a prioritized plan</text>
</svg>
