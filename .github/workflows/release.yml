name: Deploy Builderforce

on:
  push:
    branches: [ main ]

# Required for npm provenance attestation on `npm publish --provenance`.
permissions:
  contents: read
  id-token: write

jobs:
  deploy-api:
    name: Deploy API (api.builderforce.ai)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install API dependencies
        working-directory: api
        run: npm install

      - name: Run API migrations
        working-directory: api
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: npm run db:migrate

      - name: Deploy API worker
        working-directory: api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: npm run deploy:worker

  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      # Frontend's `link:` deps don't auto-build the linked packages' dist/.
      # Each linked package's `prepare` script runs `npm run build` on install,
      # so a plain `npm install` here is sufficient to produce dist/.
      - name: Install + build SDK
        working-directory: sdk
        run: npm install --no-audit --no-fund

      - name: Install + build Studio
        working-directory: studio
        run: npm install --no-audit --no-fund

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Build Next.js
        working-directory: frontend
        env:
          NEXT_PUBLIC_WORKER_URL: https://worker.builderforce.ai
        run: pnpm exec next build

      - name: Generate Cloudflare Worker (next-on-pages)
        working-directory: frontend
        run: pnpm exec next-on-pages

      - name: Create .assetsignore (prevent _worker.js from being uploaded as asset)
        working-directory: frontend
        run: |
          printf '_worker.js\n' > .vercel/output/static/.assetsignore
          echo "✅ Created .assetsignore:"
          cat .vercel/output/static/.assetsignore

      - name: Strip ORT/WASM from worker (keep under 3 MiB; serve from static)
        working-directory: frontend
        run: node scripts/strip-worker-assets.js

      - name: Patch r.fetch and add diagnostics
        working-directory: frontend
        run: |
          worker_file=".vercel/output/static/_worker.js/index.js"
          if [ -f "$worker_file" ]; then
            sed -i 's/\br\.fetch\b/(r||self).fetch/g' "$worker_file" || true
            sed -i 's/async function k(e,{request:t,assetsFetcher:r,ctx:s})/async function k(e,{request:t,assetsFetcher:r,ctx:s}){if(!r)console.log("k assetsFetcher undefined",e);/' "$worker_file" || true
            sed -i 's/var Ts={async fetch(e,t,r){/var Ts={async fetch(e,t,r){console.log("Ts.fetch",e.url);/' "$worker_file" || true
          fi

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Deploy via Wrangler
        working-directory: frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          wrangler deploy --no-bundle

  publish-sdk:
    name: Publish SDK (@seanhogg/builderforce-sdk)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Trusted Publishing on `npm publish` requires npm >= 11.5.1, which is
      # newer than the npm 10.x bundled with Node 20. Without this upgrade
      # `npm publish` skips the OIDC flow entirely and errors `ENEEDAUTH`
      # since no `_authToken` is in `.npmrc`.
      - name: Upgrade npm to a Trusted-Publishing-capable version
        run: |
          npm install -g npm@latest
          echo "npm $(npm --version) — Trusted Publishing requires >= 11.5.1"

      - name: Install SDK dependencies
        working-directory: sdk
        run: npm install

      - name: Type-check + test
        working-directory: sdk
        run: |
          npm run type-check
          npm test

      - name: Build
        working-directory: sdk
        run: npm run build

      # Auth flow: Trusted Publishing OIDC (configured on npmjs.com →
      # @seanhogg/builderforce-sdk → Publishing access → Add trusted
      # publisher → GitHub Actions / SeanHogg / Builderforce.ai /
      # release.yml). With `id-token: write` granted at workflow level and
      # no `_authToken` set in `.npmrc`, npm CLI 11.15+ auto-discovers OIDC,
      # mints a GitHub OIDC token, exchanges it at npmjs's OIDC endpoint,
      # and uses the returned credential for the publish PUT. No long-lived
      # token in repo secrets.
      #
      # `JS-DevTools/npm-publish@v3` would be cleaner but requires a `token`
      # input — it doesn't support OIDC trusted publishing as of v3. Running
      # `npm publish` directly is the only path that activates OIDC auth.
      - name: Publish if version is new
        working-directory: sdk
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@seanhogg/builderforce-sdk@$VERSION" version >/dev/null 2>&1; then
            echo "@seanhogg/builderforce-sdk@$VERSION is already on npm — skipping."
          else
            echo "@seanhogg/builderforce-sdk@$VERSION is new — publishing via OIDC."
            npm publish --provenance --access public
          fi

  publish-studio:
    name: Publish Studio (@seanhogg/builderforce-studio)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Upgrade npm to a Trusted-Publishing-capable version
        run: |
          npm install -g npm@latest
          echo "npm $(npm --version) — Trusted Publishing requires >= 11.5.1"

      - name: Install Studio dependencies
        working-directory: studio
        run: npm install

      - name: Type-check + test
        working-directory: studio
        run: |
          npm run type-check
          npm test --if-present

      - name: Build
        working-directory: studio
        run: npm run build

      # Trusted Publishing OIDC — same pattern as publish-sdk.
      # Configure once at https://www.npmjs.com/package/@seanhogg/builderforce-studio/access
      # → Publishing access → Add trusted publisher → GitHub Actions /
      # SeanHogg / Builderforce.ai / release.yml.
      - name: Publish if version is new
        working-directory: studio
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@seanhogg/builderforce-studio@$VERSION" version >/dev/null 2>&1; then
            echo "@seanhogg/builderforce-studio@$VERSION is already on npm — skipping."
          else
            echo "@seanhogg/builderforce-studio@$VERSION is new — publishing via OIDC."
            npm publish --provenance --access public
          fi

  deploy-docs:
    name: Deploy Docs (builderforce.ai/docs)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: docs-site
        run: npm install

      - name: Build Astro Starlight (base=/docs)
        working-directory: docs-site
        run: npm run build

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Deploy Pages project
        working-directory: docs-site
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          wrangler pages deploy dist --project-name=builderforce-docs --branch=main
