name: Deploy Builderforce

# Harden npm against transient registry network errors (ECONNRESET) in CI.
env:
  NPM_CONFIG_FETCH_RETRIES: "5"
  NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: "20000"
  NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: "120000"

on:
  push:
    branches: [ main ]

# Required for npm provenance attestation on `npm publish --provenance`.
permissions:
  contents: read
  id-token: write

jobs:
  deploy-api:
    name: Deploy API (api.builderforce.ai)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install API dependencies
        working-directory: api
        run: npm install

      # Drift guard — same file-based checks CI runs, but here they GATE the deploy.
      # CI and this Deploy both trigger on push:main and run concurrently, so a
      # drift-failing CI does NOT stop a deploy. Without this, a schema.ts column/
      # table with no migration would ship a worker the DB can't serve (the
      # "column \"action_type\" does not exist" 500). Failing here aborts the deploy
      # loudly instead of shipping the broken worker.
      - name: Guard — block deploy on schema/migration drift
        working-directory: api
        run: |
          npm run check:schema
          npm run check:migrations

      - name: Run API migrations
        working-directory: api
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: npm run db:migrate

      - name: Deploy API worker
        working-directory: api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: npm run deploy:worker

  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # No root package.json in this repo — pnpm lives in frontend/, so point
      # action-setup at frontend/package.json to read its `packageManager` pin.
      # Do not also set `version:` here — action-setup@v4 errors if both exist.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      # Frontend's `link:` deps don't auto-build the linked packages' dist/.
      # Each linked package's `prepare` script runs `npm run build` on install,
      # so a plain `npm install` here is sufficient to produce dist/.
      - name: Install + build SDK
        working-directory: sdk
        run: npm install --no-audit --no-fund

      - name: Install + build Studio engine
        working-directory: studio
        run: npm install --no-audit --no-fund

      # Must follow the engine build — studio-embedded file:-depends on it.
      - name: Install + build Studio embedded
        working-directory: studio-embedded
        run: npm install --no-audit --no-fund

      # brain-embedded's committed dist/ can drift or be deleted; its `prepare`
      # script (tsup) rebuilds dist/ on install so the frontend `link:` dep
      # (@seanhogg/builderforce-brain-embedded) always resolves.
      - name: Install + build Brain embedded
        working-directory: brain-embedded
        run: npm install --no-audit --no-fund

      # Must follow brain-embedded — brain-ui link:-depends on it for its DTS.
      # Uses pnpm (not npm): brain-ui has a `link:` dep npm can't parse, and its
      # own pnpm-lock.yaml. `pnpm install` runs its `prepare` (tsup) to build
      # dist/*.d.ts so the frontend `link:` dep (@seanhogg/builderforce-brain-ui)
      # resolves types instead of `any`.
      - name: Install + build Brain UI
        working-directory: packages/brain-ui
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Build Next.js
        working-directory: frontend
        env:
          NEXT_PUBLIC_WORKER_URL: https://worker.builderforce.ai
        run: pnpm exec next build

      - name: Generate Cloudflare Worker (next-on-pages)
        working-directory: frontend
        run: pnpm exec next-on-pages

      - name: Create .assetsignore (prevent _worker.js from being uploaded as asset)
        working-directory: frontend
        run: |
          printf '_worker.js\n' > .vercel/output/static/.assetsignore
          echo "✅ Created .assetsignore:"
          cat .vercel/output/static/.assetsignore

      - name: Strip ORT/WASM from worker (keep under 3 MiB; serve from static)
        working-directory: frontend
        run: node scripts/strip-worker-assets.js

      - name: Patch r.fetch and add diagnostics
        working-directory: frontend
        run: |
          worker_file=".vercel/output/static/_worker.js/index.js"
          if [ -f "$worker_file" ]; then
            sed -i 's/\br\.fetch\b/(r||self).fetch/g' "$worker_file" || true
            sed -i 's/async function k(e,{request:t,assetsFetcher:r,ctx:s})/async function k(e,{request:t,assetsFetcher:r,ctx:s}){if(!r)console.log("k assetsFetcher undefined",e);/' "$worker_file" || true
            sed -i 's/var Ts={async fetch(e,t,r){/var Ts={async fetch(e,t,r){console.log("Ts.fetch",e.url);/' "$worker_file" || true
          fi

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Deploy via Wrangler
        working-directory: frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          wrangler deploy --no-bundle

  publish-sdk:
    name: Publish SDK (@seanhogg/builderforce-sdk)
    uses: ./.github/workflows/publish-npm-package.yml
    with:
      package-dir: sdk
      package-name: '@seanhogg/builderforce-sdk'
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-studio:
    name: Publish Studio engine (@seanhogg/builderforce-studio)
    uses: ./.github/workflows/publish-npm-package.yml
    with:
      package-dir: studio
      package-name: '@seanhogg/builderforce-studio'
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-studio-embedded:
    name: Publish Studio embedded (@seanhogg/builderforce-studio-embedded)
    # Engine must publish first — the embedded package peer-depends on it.
    needs: publish-studio
    uses: ./.github/workflows/publish-npm-package.yml
    with:
      package-dir: studio-embedded
      package-name: '@seanhogg/builderforce-studio-embedded'
      # studio-embedded file:-depends on ../studio; build the engine (with its
      # devDeps) first so the embedded install's prepare re-run finds tsup.
      prebuild-package-dir: studio
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-voice:
    name: Publish Voice client (@seanhogg/builderforce-voice)
    uses: ./.github/workflows/publish-npm-package.yml
    with:
      package-dir: voice
      package-name: '@seanhogg/builderforce-voice'
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  deploy-docs:
    name: Deploy Docs (builderforce.ai/docs)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: docs-site
        run: npm install

      - name: Build Astro Starlight (base=/docs)
        working-directory: docs-site
        run: npm run build

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Deploy Pages project
        working-directory: docs-site
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          wrangler pages deploy dist --project-name=builderforce-docs --branch=main
