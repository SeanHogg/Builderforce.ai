name: Deploy Builderforce

on:
  push:
    branches: [ main ]

# Required for npm provenance attestation on `npm publish --provenance`.
permissions:
  contents: read
  id-token: write

jobs:
  deploy-api:
    name: Deploy API (api.builderforce.ai)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install API dependencies
        working-directory: api
        run: npm install

      - name: Run API migrations
        working-directory: api
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: npm run db:migrate

      - name: Deploy API worker
        working-directory: api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: npm run deploy:worker

  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build Next.js
        working-directory: frontend
        env:
          NEXT_PUBLIC_WORKER_URL: https://worker.builderforce.ai
        run: pnpm exec next build

      - name: Generate Cloudflare Worker (next-on-pages)
        working-directory: frontend
        run: pnpm exec next-on-pages

      - name: Create .assetsignore (prevent _worker.js from being uploaded as asset)
        working-directory: frontend
        run: |
          printf '_worker.js\n' > .vercel/output/static/.assetsignore
          echo "✅ Created .assetsignore:"
          cat .vercel/output/static/.assetsignore

      - name: Strip ORT/WASM from worker (keep under 3 MiB; serve from static)
        working-directory: frontend
        run: node scripts/strip-worker-assets.js

      - name: Patch r.fetch and add diagnostics
        working-directory: frontend
        run: |
          worker_file=".vercel/output/static/_worker.js/index.js"
          if [ -f "$worker_file" ]; then
            sed -i 's/\br\.fetch\b/(r||self).fetch/g' "$worker_file" || true
            sed -i 's/async function k(e,{request:t,assetsFetcher:r,ctx:s})/async function k(e,{request:t,assetsFetcher:r,ctx:s}){if(!r)console.log("k assetsFetcher undefined",e);/' "$worker_file" || true
            sed -i 's/var Ts={async fetch(e,t,r){/var Ts={async fetch(e,t,r){console.log("Ts.fetch",e.url);/' "$worker_file" || true
          fi

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Deploy via Wrangler
        working-directory: frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          wrangler deploy --no-bundle

  publish-sdk:
    name: Publish SDK (@seanhogg/builderforce-sdk)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # NOTE: `registry-url` is intentionally omitted — it would write
      # `//registry.npmjs.org/:_authToken=...` into `.npmrc`, which makes
      # `npm publish` send token auth on the PUT instead of falling through
      # to Trusted Publishing OIDC. The npm CLI uses the OIDC token minted
      # from `ACTIONS_ID_TOKEN_REQUEST_TOKEN` (granted by the top-level
      # `id-token: write` permission) for both provenance signing and
      # publish-auth, so no token is required here.
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Trusted Publishing on `npm publish` requires npm >= 11.5.1. Node 20
      # ships npm 10.x by default, which silently skips OIDC and errors with
      # `ENEEDAUTH` when no `_authToken` is set. Pin to `latest` rather than a
      # specific minor range so we don't silently no-op when the requested
      # version doesn't match a published release.
      - name: Upgrade npm to a Trusted-Publishing-capable version
        run: npm install -g npm@latest

      # Diagnostic line — the previous run's log only showed the publish step,
      # so we couldn't tell whether the upgrade above actually took effect.
      # This prints the versions + OIDC env presence (true/false, never the
      # token value itself) so the next failure (if any) is self-describing.
      - name: Print toolchain + OIDC env state
        run: |
          echo "node $(node --version)"
          echo "npm  $(npm --version)"
          echo "registry $(npm config get registry)"
          echo "ACTIONS_ID_TOKEN_REQUEST_URL   present? $([ -n \"$ACTIONS_ID_TOKEN_REQUEST_URL\" ] && echo true || echo false)"
          echo "ACTIONS_ID_TOKEN_REQUEST_TOKEN present? $([ -n \"$ACTIONS_ID_TOKEN_REQUEST_TOKEN\" ] && echo true || echo false)"

      - name: Install SDK dependencies
        working-directory: sdk
        run: npm install

      - name: Type-check + test
        working-directory: sdk
        run: |
          npm run type-check
          npm test

      - name: Build
        working-directory: sdk
        run: npm run build

      # Auth flow: Trusted Publishing OIDC (configured on npmjs.com →
      # @seanhogg/builderforce-sdk → Publishing access → Add trusted
      # publisher → GitHub Actions / SeanHogg / Builderforce.ai /
      # release.yml). `NPM_TOKEN` is intentionally NOT passed — token-auth
      # being present in `.npmrc` would short-circuit the OIDC fallback and
      # send a stale token on the PUT.
      - name: Publish if version is new
        working-directory: sdk
        run: npm run publish:if-new

  deploy-docs:
    name: Deploy Docs (builderforce.ai/docs)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: docs-site
        run: npm install

      - name: Build Astro Starlight (base=/docs)
        working-directory: docs-site
        run: npm run build

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Deploy Pages project
        working-directory: docs-site
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          wrangler pages deploy dist --project-name=builderforce-docs --branch=main
