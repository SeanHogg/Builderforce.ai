name: Agentic QA

# Authenticated browser smoke suite. Pulls AI-generated specs from the API,
# runs them against the deployed app, and reports results back to /api/qa/runs
# (visible in Observability ▸ Agentic QA).

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "App URL under test (overrides BF_BASE_URL secret)"
        required: false
        type: string
  schedule:
    # Daily at 08:00 UTC.
    - cron: "0 8 * * *"

jobs:
  qa:
    name: Authenticated smoke (chromium)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: qa-e2e
        run: npm install

      - name: Install Playwright browser
        working-directory: qa-e2e
        run: npx playwright install --with-deps chromium

      - name: Run QA suite (pull → test → report)
        working-directory: qa-e2e
        env:
          BF_API_URL: ${{ secrets.BF_API_URL || 'https://api.builderforce.ai' }}
          BF_BASE_URL: ${{ github.event.inputs.base_url || secrets.BF_BASE_URL || 'https://builderforce.ai' }}
          BF_QA_EMAIL: ${{ secrets.BF_QA_EMAIL }}
          BF_QA_PASSWORD: ${{ secrets.BF_QA_PASSWORD }}
          BF_QA_TENANT_ID: ${{ secrets.BF_QA_TENANT_ID }}
        run: npm run ci

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            qa-e2e/playwright-report
            qa-e2e/results.json
          retention-days: 14
          if-no-files-found: ignore
