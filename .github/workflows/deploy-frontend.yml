name: Deploy Frontend

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Cloudflare adapter
        working-directory: frontend
        run: npm install @cloudflare/next-on-pages --no-save --legacy-peer-deps

      - name: Build Next.js and generate Worker
        working-directory: frontend
        run: |
          npx @cloudflare/next-on-pages

      - name: Patch r.fetch usage and add debug logs
        working-directory: frontend
        run: |
          # make r.fetch safe when r is undefined and add logging for diagnostics
          worker_file=".vercel/output/static/_worker.js/index.js"
          if [ -f "$worker_file" ]; then
            # global fallback for any r.fetch calls
            sed -i 's/\br\.fetch\b/(r||self).fetch/g' "$worker_file" || true
            # logging when assetsFetcher (r) is undefined in k()
            sed -i 's/async function k(e,{request:t,assetsFetcher:r,ctx:s})/async function k(e,{request:t,assetsFetcher:r,ctx:s}){if(!r)console.log("k assetsFetcher undefined",e);/' "$worker_file" || true
            # log each incoming request URL at start of Ts.fetch
            sed -i 's/var Ts={async fetch(e,t,r){/var Ts={async fetch(e,t,r){console.log("Ts.fetch",e.url);/' "$worker_file" || true
          fi

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Deploy via Wrangler
        working-directory: frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          wrangler deploy
