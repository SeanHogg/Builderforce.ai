name: Deploy Frontend

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Cloudflare adapter
        working-directory: frontend
        run: npm install @cloudflare/next-on-pages --no-save --legacy-peer-deps

      - name: Build Next.js and generate Worker
        working-directory: frontend
        run: |
          npx @cloudflare/next-on-pages

      - name: Patch assetsFetcher guard
        working-directory: frontend
        run: |
          # ensure assetsFetcher is defined to avoid undefined.fetch errors
          worker_file=".vercel/output/static/_worker.js/index.js"
          if [ -f "$worker_file" ]; then
            # insert guard at start of function k
            sed -i "/async function k(e/ a \
    if (!assetsFetcher) { assetsFetcher = { fetch: req => fetch(req) }; }\n" "$worker_file"
          fi

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Deploy via Wrangler
        working-directory: frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          wrangler deploy
