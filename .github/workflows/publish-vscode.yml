name: Publish VS Code Extension

# Tag a release as `vscode-v<version>` (e.g. vscode-v2026.6.17) to package once and
# publish to both the VS Code Marketplace and Open VSX.
on:
  push:
    tags:
      - "vscode-v*"
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/vscode
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: clients/vscode/pnpm-lock.yaml

      # pnpm --frozen-lockfile so the published .vsix is compiled against the
      # same tree ci.yml's `clients/vscode · types` job type-checked. `npm
      # install` re-resolved from a package-lock.json nothing gates, so the
      # extension users install could differ from the one that passed types.
      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Compile
        run: npm run compile

      - name: Package
        run: npx vsce package --no-dependencies -o builderforce-ai.vsix

      - name: Publish to VS Code Marketplace
        run: npx vsce publish --no-dependencies --packagePath builderforce-ai.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX
        run: npx ovsx publish builderforce-ai.vsix -p "$OVSX_PAT"
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v7
        with:
          name: builderforce-ai-vsix
          path: clients/vscode/builderforce-ai.vsix
