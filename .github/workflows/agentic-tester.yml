name: Agentic Tester

# Heatmap-driven exploratory tester. Runs INSIDE the Playwright container, claims
# a queued exploration (created from Observability ▸ Agentic QA ▸ Agentic Tester),
# drives a real browser through the hottest zones, and feeds captured runtime
# errors back to /api/qa/explorations/:id/findings (each can spawn a board task).
#
# Queue an exploration in the UI first (it snapshots the heatmap + builds the
# plan); this job then drains it. Trigger manually or on a cadence.

on:
  workflow_dispatch:
    inputs:
      exploration_id:
        description: "Claim this specific exploration id (else the oldest queued)"
        required: false
        type: string
      project_id:
        description: "Project mode: claim the next queued exploration for this project id"
        required: false
        type: string
  schedule:
    # Hourly — drains one queued exploration per run.
    - cron: "30 * * * *"

jobs:
  explore:
    name: Heatmap exploration (chromium)
    runs-on: ubuntu-latest
    # Execute in the context of the Playwright container — browser + deps baked in.
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-jammy
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        working-directory: qa-e2e
        run: npm install --no-audit --no-fund

      - name: Run agentic exploration (claim → explore → report)
        working-directory: qa-e2e
        env:
          BF_API_URL: ${{ secrets.BF_API_URL || 'https://api.builderforce.ai' }}
          BF_BASE_URL: ${{ secrets.BF_BASE_URL || 'https://builderforce.ai' }}
          BF_QA_EMAIL: ${{ secrets.BF_QA_EMAIL }}
          BF_QA_PASSWORD: ${{ secrets.BF_QA_PASSWORD }}
          BF_QA_TENANT_ID: ${{ secrets.BF_QA_TENANT_ID }}
          BF_PROJECT_ID: ${{ github.event.inputs.project_id || secrets.BF_PROJECT_ID }}
          BF_EXPLORATION_ID: ${{ github.event.inputs.exploration_id }}
        run: npm run explore
