name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sdk:
    name: SDK (Node.js 20)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sdk/package-lock.json
      - name: Install dependencies
        working-directory: sdk
        run: npm install
      - name: Type check
        working-directory: sdk
        run: npm run type-check
      - name: Test
        working-directory: sdk
        run: npm test
      - name: Build
        working-directory: sdk
        run: npm run build

  api:
    name: API (Node.js 20)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json
      - name: Install dependencies
        working-directory: api
        run: npm install
      - name: Type check
        working-directory: api
        run: npm run type-check
      - name: Test
        working-directory: api
        run: npm test

  frontend:
    name: Frontend (Node.js 20)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Version is read from the `packageManager` field in package.json.
      # Do not also set `version:` here — action-setup@v4 errors if both exist.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      # Frontend's `link:` deps to ../sdk and ../studio require those packages'
      # dist/ to exist before pnpm install symlinks them. Each linked package's
      # `prepare` script runs `npm run build` on install — so a bare npm
      # install in those dirs is sufficient.
      - name: "Build SDK + Studio + Studio-embedded (link: dep prerequisites)"
        run: |
          (cd sdk && npm install --no-audit --no-fund)
          (cd studio && npm install --no-audit --no-fund)
          (cd studio-embedded && npm install --no-audit --no-fund)

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile || pnpm install
      - name: Lint
        working-directory: frontend
        run: pnpm run lint
      - name: Test
        working-directory: frontend
        run: pnpm test
      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_WORKER_URL: https://worker.builderforce.ai
        run: pnpm run build

  docs:
    name: Docs (Astro Starlight)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs-site/package-lock.json
      - name: Install dependencies
        working-directory: docs-site
        run: npm install
      - name: Build
        working-directory: docs-site
        run: npm run build
