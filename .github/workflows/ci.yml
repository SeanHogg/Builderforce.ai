name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sdk:
    name: SDK (Node.js 20)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sdk/package-lock.json
      - name: Install dependencies
        working-directory: sdk
        run: npm install
      - name: Use-case sync check
        working-directory: sdk
        run: npm run check:usecases
      - name: Type check
        working-directory: sdk
        run: npm run type-check
      - name: Test
        working-directory: sdk
        run: npm test
      - name: Build
        working-directory: sdk
        run: npm run build

  api:
    name: API (Node.js 20)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json
      - name: Install dependencies
        working-directory: api
        run: npm install
      - name: Type check
        working-directory: api
        run: npm run type-check
      - name: Test
        working-directory: api
        run: npm test

  frontend:
    name: Frontend (Node.js 20)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm install
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Test
        working-directory: frontend
        run: npm test
      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_WORKER_URL: https://worker.builderforce.ai
        run: npm run build
