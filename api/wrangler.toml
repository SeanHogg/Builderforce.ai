name = "builderforce-api"
main = "src/index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

[[routes]]
pattern = "api.builderforce.ai"
custom_domain = true

[vars]
# Overridden by Cloudflare dashboard secrets for production.
CORS_ORIGINS = "*"
ENVIRONMENT  = "production"
APP_URL      = "https://builderforce.ai"
NOTIFICATION_EMAIL_FROM = "Builderforce <notifications@builderforce.ai>"
# NEON_DATABASE_URL must be set via: wrangler secret put NEON_DATABASE_URL
# JWT_SECRET must be set via: wrangler secret put JWT_SECRET
# OPENROUTER_API_KEY must be set via: wrangler secret put OPENROUTER_API_KEY
# OPENROUTER_API_KEY_PRO must be set via: wrangler secret put OPENROUTER_API_KEY_PRO
# RESEND_API_KEY must be set via: wrangler secret put RESEND_API_KEY
# Do NOT put the real value here – use a long random string (32+ chars).

# Wrangler dev overrides (local only, never committed)
[[durable_objects.bindings]]
name = "AGENT_HOST_RELAY"
class_name = "AgentHostRelayDO"

[[durable_objects.bindings]]
name = "SESSION_ROOM"
class_name = "SessionRoomDO"

[[durable_objects.bindings]]
name = "ANALYSIS_RUNNER"
class_name = "AnalysisRunnerDO"

[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "builderforce-uploads"

# Auth-resolution cache. Caches `bfk_*` and `clk_*` lookups for ~60s so every
# chat-completion call doesn't pay a Neon round-trip just to validate the key.
# See api/src/infrastructure/auth/keyResolutionCache.ts.
[[kv_namespaces]]
binding = "AUTH_CACHE_KV"
id = "ce66c3418ad64952b6847227962429d0"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ClawRelayDO"]

[[migrations]]
tag = "v2"
# Free-plan Durable Objects must be backed by SQLite storage; `new_classes`
# (the legacy KV-backed variant) is rejected with error 10097 on the free plan.
new_sqlite_classes = ["SessionRoomDO"]

[[migrations]]
tag = "v3"
# AnalysisRunnerDO uses storage alarms to advance the repo-analysis pipeline one
# stage per tick; alarms require a SQLite-backed Durable Object class.
new_sqlite_classes = ["AnalysisRunnerDO"]

[[migrations]]
tag = "v4"
# Rebrand: the agent-host relay Durable Object was renamed ClawRelayDO ->
# AgentHostRelayDO (CoderClaw -> BuilderForce Agents). renamed_classes preserves
# existing DO instances/storage across the rename. Binding: AGENT_HOST_RELAY.
renamed_classes = [{ from = "ClawRelayDO", to = "AgentHostRelayDO" }]

# Cron triggers — see scheduled() in src/index.ts
#   "0 9 * * *"   09:00 UTC daily: probe every LLM vendor; email superadmins on status change.
#   "*/5 * * * *" every 5 min: fire due schedule + rss workflow triggers, then advance
#                 pending cloud-runtime workflows. Schedules finer than 5 min coalesce to it.
[triggers]
crons = ["0 9 * * *", "*/5 * * * *"]

# Inbound-email workflow trigger (the `inbound-email` trigger type) is delivered to
# the email() handler in src/index.ts. It requires Cloudflare Email Routing to be
# enabled for the zone and a catch-all/custom-address rule forwarding to this Worker.
# Provision in the dashboard (Email → Email Routing → Email Workers) — there is no
# wrangler binding for inbound email beyond the email() handler. See Gap Register.

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

[dev]
port = 8787
local_protocol = "http"
