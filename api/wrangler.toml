name = "builderforce-api"
main = "src/index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

[[routes]]
pattern = "api.builderforce.ai"
custom_domain = true

# Wildcard subdomain hosting for published IDE (Designer) projects. Every
# `<sub>.builderforce.ai` request lands on this worker; the host-hosting
# middleware in src/index.ts serves it from R2 (`sites/<sub>/...`) as a public
# website. A zone route (not custom_domain) so one pattern covers all subdomains.
#
# Single-label apex (`*.builderforce.ai`, NOT `*.apps.builderforce.ai`) so the
# FREE Universal SSL cert covers it — a second-level wildcard would need paid ACM.
# The trade-off: this apex is SHARED with platform hostnames, so the route is
# greedy. Two safeguards: (1) more-specific routes win — `api.builderforce.ai`
# (custom_domain above) and any www/app frontend binding keep their traffic;
# (2) `subdomainFromHost` (siteHosting.ts) refuses RESERVED_SUBDOMAINS, so a
# reserved label that DOES hit this worker falls through to normal routing.
#
# REQUIRES a matching proxied wildcard DNS record so unclaimed labels resolve to
# the edge — add once (Cloudflare dashboard → DNS, or the API call below):
#   Type AAAA  Name *  Content 100::  Proxied (orange cloud)
#   (specific records for api/www/etc. take DNS precedence over the wildcard;
#    100:: is the standard discard placeholder for a Worker-only route.)
[[routes]]
pattern = "*.builderforce.ai/*"
zone_name = "builderforce.ai"

# Same-origin gateway path. Corporate networks frequently whitelist the primary
# apex (builderforce.ai) but block the `api.` subdomain, so direct calls to
# api.builderforce.ai fail on some users' machines. `builderforce.ai/gateway/*`
# lands on THIS worker instead — a more-specific path route overrides the frontend
# worker's apex `custom_domain` for this prefix only (everything else still serves
# the Next.js app). The worker strips the `/gateway` prefix (see `stripGatewayPrefix`
# in src/index.ts) so every route/middleware is byte-identical to api.builderforce.ai.
# This is the ONE whitelisted host all clients (VS Code extension + integrations)
# should target; nobody needs to reach the api.* subdomain directly.
[[routes]]
pattern = "builderforce.ai/gateway/*"
zone_name = "builderforce.ai"

[vars]
# Overridden by Cloudflare dashboard secrets for production.
CORS_ORIGINS = "*"
ENVIRONMENT  = "production"
APP_URL      = "https://builderforce.ai"
NOTIFICATION_EMAIL_FROM = "Builderforce <notifications@builderforce.ai>"
# CLOUDFLARE_ACCOUNT_ID must be set via: wrangler secret put CLOUDFLARE_ACCOUNT_ID
#   The Cloudflare Workers AI `/accounts/<id>/ai/run/<model>` path needs it ALONGSIDE
#   the CLOUDFLARE_AI_API_TOKEN secret — the vendor's apiKeyFrom returns null and
#   SKIPS Cloudflare if EITHER is absent. Kept as a SECRET (never committed) so the
#   id isn't exposed in the repo. A missing/misnamed binding is exactly why
#   Cloudflare (PAID_LEAD_VENDOR, free daily neurons) was dead on every call and
#   coding overflow floored to the metered Anthropic key.
# NEON_DATABASE_URL must be set via: wrangler secret put NEON_DATABASE_URL
# NEON_TRANSACTIONAL_DATABASE_URL must be set via: wrangler secret put NEON_TRANSACTIONAL_DATABASE_URL
# JWT_SECRET must be set via: wrangler secret put JWT_SECRET
# OPENROUTER_API_KEY must be set via: wrangler secret put OPENROUTER_API_KEY
# OPENROUTER_API_KEY_PRO must be set via: wrangler secret put OPENROUTER_API_KEY_PRO
# RESEND_API_KEY must be set via: wrangler secret put RESEND_API_KEY
# Do NOT put the real value here – use a long random string (32+ chars).

# Wrangler dev overrides (local only, never committed)
[[durable_objects.bindings]]
name = "AGENT_HOST_RELAY"
class_name = "AgentHostRelayDO"

[[durable_objects.bindings]]
name = "SESSION_ROOM"
class_name = "SessionRoomDO"

[[durable_objects.bindings]]
name = "CEREMONY_ROOM"
class_name = "CeremonyRoomDO"

[[durable_objects.bindings]]
name = "ANALYSIS_RUNNER"
class_name = "AnalysisRunnerDO"

[[durable_objects.bindings]]
name = "CLOUD_RUNNER"
class_name = "CloudRunnerDO"

[[durable_objects.bindings]]
name = "PROJECT_EVERMIND"
class_name = "ProjectEvermindCoordinatorDO"

[[durable_objects.bindings]]
name = "AGENT_CONTAINER"
class_name = "AgentContainerDO"

[[durable_objects.bindings]]
name = "QA_RUNNER_CONTAINER"
class_name = "QaRunnerContainerDO"

# Long-lived Cloudflare Container for "Cloud Agent (Node/Container)" runs — a
# persistent Node process with a real shell (build/test/lint). The image lives in
# api/container; build context is that dir. Requires a Workers Paid plan with
# Containers enabled. `max_instances` caps concurrent containers (cost guard).
[[containers]]
class_name = "AgentContainerDO"
image = "./container/Dockerfile"
max_instances = 5
name = "builderforce-agent-container"

# Agentic Tester runner — the Playwright browser-exploration container. The
# scheduled QA sweep dispatches `POST /run` per queued exploration. Self-contained
# under api/qa-container (mirrors api/container). Same Containers-enabled Paid-plan
# requirement; `max_instances` caps concurrent browser runs.
[[containers]]
class_name = "QaRunnerContainerDO"
image = "./qa-container/Dockerfile"
max_instances = 3
name = "builderforce-qa-runner"

[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "builderforce-uploads"

# Auth-resolution cache. Caches `bfk_*` and `clk_*` lookups for ~60s so every
# chat-completion call doesn't pay a Neon round-trip just to validate the key.
# See api/src/infrastructure/auth/keyResolutionCache.ts.
[[kv_namespaces]]
binding = "AUTH_CACHE_KV"
id = "ce66c3418ad64952b6847227962429d0"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ClawRelayDO"]

[[migrations]]
tag = "v2"
# Free-plan Durable Objects must be backed by SQLite storage; `new_classes`
# (the legacy KV-backed variant) is rejected with error 10097 on the free plan.
new_sqlite_classes = ["SessionRoomDO"]

[[migrations]]
tag = "v3"
# AnalysisRunnerDO uses storage alarms to advance the repo-analysis pipeline one
# stage per tick; alarms require a SQLite-backed Durable Object class.
new_sqlite_classes = ["AnalysisRunnerDO"]

[[migrations]]
tag = "v4"
# Rebrand: the agent-host relay Durable Object was renamed ClawRelayDO ->
# AgentHostRelayDO (CoderClaw -> BuilderForce Agents). renamed_classes preserves
# existing DO instances/storage across the rename. Binding: AGENT_HOST_RELAY.
renamed_classes = [{ from = "ClawRelayDO", to = "AgentHostRelayDO" }]

[[migrations]]
tag = "v5"
# CloudRunnerDO runs a V2 cloud agent's loop one LLM step per alarm() tick (the
# `durable` runtime surface); alarms require a SQLite-backed Durable Object class.
new_sqlite_classes = ["CloudRunnerDO"]

[[migrations]]
tag = "v6"
# AgentContainerDO backs the Cloudflare Container runtime (the `container` runtime
# surface — a long-lived Node process with a real shell). Container-control DOs are
# SQLite-backed.
new_sqlite_classes = ["AgentContainerDO"]

[[migrations]]
tag = "v7"
# CeremonyRoomDO is the live standup/planning round-table relay (presence + cursor +
# `changed` fan-out, keyed `ceremony:<projectId>`). Memory-only like SessionRoomDO,
# but free-plan Durable Objects must still be SQLite-backed.
new_sqlite_classes = ["CeremonyRoomDO"]

[[migrations]]
tag = "v8"
# QaRunnerContainerDO backs the Agentic Tester Cloudflare Container (the Playwright
# browser-exploration runner). Container-control DOs are SQLite-backed.
new_sqlite_classes = ["QaRunnerContainerDO"]

[[migrations]]
tag = "v9"
# ProjectEvermindCoordinatorDO is the single serialized writer for a project's
# self-learning Evermind model — it batches concurrent learning pushes via a
# storage alarm and FedAvg-merges weight deltas. Alarms require SQLite-backed DOs.
new_sqlite_classes = ["ProjectEvermindCoordinatorDO"]

# Cron triggers — see scheduled() in src/index.ts
#   "0 9 * * *"   09:00 UTC daily: probe every LLM vendor; email superadmins on status change.
#   "*/5 * * * *" every 5 min: fire due schedule + rss workflow triggers, then advance
#                 pending cloud-runtime workflows; reap stale runs; AND run the always-on
#                 autonomous executor (start every agent-owned pending ticket across all
#                 tenants, token-gated). Schedules finer than 5 min coalesce to it.
#   "0 8 * * 1" weekly (Mon 08:00 UTC): Security-agent SOC 2 audit sweep — one audit
#                 per tenant that has a Security agent (heavier than the daily passes,
#                 so weekly). No-op for tenants without a Security agent.
#   "0 16 * * 5" weekly (Fri 16:00 UTC): release-notes marketing digest — email every
#                 published-and-not-yet-emailed release note to consenting users
#                 (product_updates lifecycle category), then flag the notes sent.
#                 No-op on weeks with nothing new. See application/email/releaseDigest.ts.
[triggers]
crons = ["0 9 * * *", "0 8 * * 1", "0 16 * * 5", "*/5 * * * *"]

# Inbound-email workflow trigger (the `inbound-email` trigger type) is delivered to
# the email() handler in src/index.ts. It requires Cloudflare Email Routing to be
# enabled for the zone and a catch-all/custom-address rule forwarding to this Worker.
# Provision in the dashboard (Email → Email Routing → Email Workers) — there is no
# wrangler binding for inbound email beyond the email() handler. See Gap Register.

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

[dev]
port = 8787
local_protocol = "http"
