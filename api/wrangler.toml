name = "builderforce-api"
main = "src/index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

[[routes]]
pattern = "api.builderforce.ai"
custom_domain = true

[vars]
# Overridden by Cloudflare dashboard secrets for production.
CORS_ORIGINS = "*"
ENVIRONMENT  = "production"
APP_URL      = "https://builderforce.ai"
NOTIFICATION_EMAIL_FROM = "Builderforce <notifications@builderforce.ai>"
# NEON_DATABASE_URL must be set via: wrangler secret put NEON_DATABASE_URL
# JWT_SECRET must be set via: wrangler secret put JWT_SECRET
# OPENROUTER_API_KEY must be set via: wrangler secret put OPENROUTER_API_KEY
# OPENROUTER_API_KEY_PRO must be set via: wrangler secret put OPENROUTER_API_KEY_PRO
# RESEND_API_KEY must be set via: wrangler secret put RESEND_API_KEY
# Do NOT put the real value here – use a long random string (32+ chars).

# Wrangler dev overrides (local only, never committed)
[[durable_objects.bindings]]
name = "CLAW_RELAY"
class_name = "ClawRelayDO"

[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "builderforce-uploads"

# Auth-resolution cache. Caches `bfk_*` and `clk_*` lookups for ~60s so every
# chat-completion call doesn't pay a Neon round-trip just to validate the key.
# See api/src/infrastructure/auth/keyResolutionCache.ts.
[[kv_namespaces]]
binding = "AUTH_CACHE_KV"
id = "ce66c3418ad64952b6847227962429d0"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ClawRelayDO"]

# Cron triggers — see scheduled() in src/index.ts
# 09:00 UTC daily: probe every registered LLM vendor and email superadmins on status change.
[triggers]
crons = ["0 9 * * *"]

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

[dev]
port = 8787
local_protocol = "http"
