name = "builderforce-worker"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Neon Postgres — set via: wrangler secret put NEON_DATABASE_URL
# [vars]
# NEON_DATABASE_URL = "postgresql://user:password@host.neon.tech/dbname?sslmode=require"

# ---------------------------------------------------------------------------
# Gateway configuration
# ---------------------------------------------------------------------------
# Worker LLM-triggering routes call the centralized Builderforce gateway:
#   POST https://api.builderforce.ai/llm/v1/chat/completions
#
# Keep this as a visible var (not a secret) so local/dev/prod targets are explicit.

[vars]
BUILDERFORCE_API_BASE_URL = "https://api.builderforce.ai"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "builderforce-storage"

[[durable_objects.bindings]]
name = "COLLABORATION_ROOM"
class_name = "CollaborationRoom"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["CollaborationRoom"]

# explicit custom domain for the legacy IDE/data worker
[[routes]]
pattern = "worker.builderforce.ai"
custom_domain = true

# observability settings
[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
