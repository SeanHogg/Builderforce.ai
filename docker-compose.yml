# Builderforce.ai — full-stack local dev via Docker.
#
#   docker compose up --build
#
# Brings up:
#   - sdk-watch       tsup --watch on sdk/,    publishes to a named volume
#   - studio-watch    tsup --watch on studio/, publishes to a named volume
#   - api      :8787  Cloudflare Worker (wrangler dev)
#   - frontend :3000  Next.js dev with HMR
#
# Hot-reload behaviour:
#   - Edit studio/src/*  → studio-watch tsup rebuilds → frontend HMR picks up
#   - Edit sdk/src/*     → sdk-watch tsup rebuilds   → frontend HMR picks up
#   - Edit frontend/src/* → next dev HMR (direct)
#   - Edit api/src/*     → wrangler dev hot-reloads worker
#
# Prerequisites the stack does NOT provision (intentional):
#   - NEON_DATABASE_URL and NEON_TRANSACTIONAL_DATABASE_URL must be set in
#     api/.dev.vars (or env). The api uses
#     @neondatabase/serverless HTTP transport — see Gap Register for why
#     we don't bundle a local Postgres.
#   - JWT_SECRET and OPENROUTER_API_KEY also live in api/.dev.vars.
#
# The AI Video Studio runs entirely in the BROWSER (WebGPU / WebNN). Docker
# only hosts the dev servers. Open http://localhost:3000/studio in Chrome 113+.

volumes:
  sdk-dist:
  studio-dist:
  studio-embedded-dist:

services:
  # ---------------------------------------------------------------------------
  # Workspace watchers — produce dist/ to named volumes that frontend consumes.
  # Each runs `npm install` once then `tsup --watch` for the stack's lifetime.
  # ---------------------------------------------------------------------------
  sdk-watch:
    image: node:20-bookworm-slim
    working_dir: /sdk
    command:
      - sh
      - -c
      - "npm install --no-audit --no-fund && npx tsup --config tsup.config.ts --watch"
    volumes:
      - ./sdk/src:/sdk/src
      - ./sdk/package.json:/sdk/package.json:ro
      - ./sdk/tsconfig.json:/sdk/tsconfig.json:ro
      - ./sdk/tsup.config.ts:/sdk/tsup.config.ts:ro
      - sdk-dist:/sdk/dist
    healthcheck:
      test: ["CMD-SHELL", "test -f /sdk/dist/index.mjs"]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 60s

  # One watcher owns both studio packages: it builds the engine first (so the
  # embedded package's file:../studio prepare hook finds tsup), builds embedded,
  # then watches both — engine in the background, embedded in the foreground.
  # A single container avoids two services racing on the studio-dist volume.
  studio-watch:
    image: node:20-bookworm-slim
    working_dir: /studio
    command:
      - sh
      - -c
      - "cd /studio && npm install --no-audit --no-fund && cd /studio-embedded && npm install --no-audit --no-fund && (cd /studio && npx tsup --config tsup.config.ts --watch &) && cd /studio-embedded && npx tsup --config tsup.config.ts --watch"
    volumes:
      - ./studio/src:/studio/src
      - ./studio/package.json:/studio/package.json:ro
      - ./studio/tsconfig.json:/studio/tsconfig.json:ro
      - ./studio/tsup.config.ts:/studio/tsup.config.ts:ro
      - ./studio-embedded/src:/studio-embedded/src
      - ./studio-embedded/package.json:/studio-embedded/package.json:ro
      - ./studio-embedded/tsconfig.json:/studio-embedded/tsconfig.json:ro
      - ./studio-embedded/tsup.config.ts:/studio-embedded/tsup.config.ts:ro
      - studio-dist:/studio/dist
      - studio-embedded-dist:/studio-embedded/dist
    healthcheck:
      test: ["CMD-SHELL", "test -f /studio/dist/index.mjs && test -f /studio-embedded/dist/index.mjs && test -f /studio-embedded/dist/styles.css"]
      interval: 5s
      timeout: 3s
      retries: 80
      start_period: 90s

  # ---------------------------------------------------------------------------
  # API worker (wrangler dev)
  # workerd is pre-pulled at image-build time (Dockerfile.api deps stage).
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
      target: dev
    environment:
      ENVIRONMENT: development
      CORS_ORIGINS: http://localhost:3000
      # NEON_DATABASE_URL, NEON_TRANSACTIONAL_DATABASE_URL, JWT_SECRET,
      # OPENROUTER_API_KEY come from api/.dev.vars
    ports:
      - "8787:8787"
    volumes:
      - ./api/src:/repo/api/src:ro
      - ./api/wrangler.toml:/repo/api/wrangler.toml:ro
      - ./api/.dev.vars:/repo/api/.dev.vars:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8787/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Frontend (Next.js dev)
  # link: protocol means sdk + studio are symlinks; bind-mount + named volume
  # together let watcher rebuilds flow into the running Next dev server.
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: dev
    environment:
      NEXT_PUBLIC_WORKER_URL: http://localhost:8787
      NEXT_PUBLIC_API_URL: http://localhost:8787
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/repo/frontend/src
      - ./frontend/public:/repo/frontend/public:ro
      - ./frontend/next.config.js:/repo/frontend/next.config.js:ro
      - ./sdk:/repo/sdk
      - ./studio:/repo/studio
      - ./studio-embedded:/repo/studio-embedded
      - sdk-dist:/repo/sdk/dist
      - studio-dist:/repo/studio/dist
      - studio-embedded-dist:/repo/studio-embedded/dist
    depends_on:
      api:
        condition: service_healthy
      sdk-watch:
        condition: service_healthy
      studio-watch:
        condition: service_healthy
