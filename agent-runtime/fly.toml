# Fly.io deployment for a CLOUD BuilderForce Agent.
#
# A BuilderForce Agent can run On-Premise (on your own machine) or in the Cloud
# (deployed like this). Either type can be assigned to a swimlane. This config
# runs the agent-runtime gateway as a long-lived process that dials OUT to the
# Builderforce relay (wss://api.builderforce.ai/api/agentNodes/:id/upstream) and
# executes swimlane `agent_dispatch` coding tasks. It needs NO inbound HTTP
# service — there is no [http_service] block on purpose; the agent is a client
# of the relay, not a server.
#
# Prerequisites (see docs/CLOUD_DEPLOY.md for the full runbook):
#   1. @builderforce/memory must be published to npm (the Docker `pnpm install
#      --frozen-lockfile` 404s until then — tracked in the root gap register).
#   2. Register the agent (POST /api/agent-hosts) to get its numeric id + API
#      key, then write .builderforce/context.yaml with that instanceId onto the
#      mounted volume, and `fly secrets set BUILDERFORCE_API_KEY=<key>`.
#
# Replace app name + region before first deploy.
app = "builderforce-agent"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  BUILDERFORCE_URL = "https://api.builderforce.ai"
  # Persist state (context.yaml + the per-dispatch clone workspace) on the volume.
  BUILDERFORCE_AGENTS_STATE_DIR = "/data"
  NODE_ENV = "production"

# A persistent volume holds .builderforce/context.yaml (the instanceId the relay
# reads at boot) and the workspace clones. Create with:
#   fly volumes create agent_data --size 10 --region iad
[mounts]
  source = "agent_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-2x"
  memory = "2gb"

# Keep exactly one instance running (one process per agent registration).
[deploy]
  strategy = "immediate"
